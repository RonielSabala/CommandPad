            for (const runbook of visibleRunbooks) {
                const row = document.createElement('div');
                row.className = CssClass.RUNBOOK_ROW;
                row.dataset.runbookId = runbook.id;

                const isActive = runbook.id === activeRunbookId;

                row.innerHTML = `
                <div class="runbook-drag-handle drag-handle" title="Drag to reorder">

                </div>
                <button class="runbook-item-btn ${isActive ? CssClass.ACTIVE : ''}"

                    title="${escapeHtml(runbook.label)}"

                    <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M3 3l10 10M13 3L3 13"/>
                    </svg>

        //  Variable resolution

        function getVariableMap() {
            const variables = state.variables ?? [];
            if (!variables) {
                return {};
            }

            const rawMap = {};
            const resolvedMap = {};

            for (const variable of variables) {
                const key = variable.key.trim();
                if (!key) {
                    continue;
                }

                rawMap[key] = variable.value;
            }

            function resolveValue(key, visitedKeys = new Set()) {
                if (key in resolvedMap) {
                    return resolvedMap[key];
                }

                if (visitedKeys.has(key)) {
                    return `{${key}}`;
                }

                visitedKeys.add(key);
                const raw = rawMap[key] ?? '';
                const resolved = raw.replace(/\{([^}]+)\}/g, (match, refKey) => {
                    return refKey in rawMap ? resolveValue(refKey, new Set(visitedKeys)) : match;
                });

                resolvedMap[key] = resolved;
                return resolved;
            }

            for (const key of Object.keys(rawMap)) {
                resolveValue(key);
            }

            return resolvedMap;
        }

        function resolveCommandText(rawText, variableMap) {
            const segments = [];
            const tokenRegex = /\{([^}]+)\}/g;
            let lastIndex = 0;
            let match;

            while ((match = tokenRegex.exec(rawText)) !== null) {
                if (match.index > lastIndex) {
                    segments.push({
                        text: rawText.slice(lastIndex, match.index),
                        type: SegmentType.LITERAL
                    });
                }

                const key = match[1];
                if (Object.prototype.hasOwnProperty.call(variableMap, key)) {
                    const value = variableMap[key];
                    segments.push({
                        text: value || `{${key}}`,
                        type: value ? SegmentType.RESOLVED : SegmentType.UNRESOLVED
                    });
                } else {
                    segments.push({
                        text: match[0],
                        type: SegmentType.UNRESOLVED
                    });
                }

                lastIndex = match.index + match[0].length;
            }

            if (lastIndex < rawText.length) {
                segments.push({
                    text: rawText.slice(lastIndex),
                    type: SegmentType.LITERAL
                });
            }

            return segments;
        }

        function resolveCommandToString(rawText, variableMap) {
            return resolveCommandText(rawText, variableMap).map(segment => segment.text).join('');
        }

        function buildPreviewHTML(rawText, variableMap) {
            const segments = resolveCommandText(rawText, variableMap);
            return segments.map(s => `<span class="token-${s.type}">${escapeHtml(s.text)}</span>`).join('');
        }

        function hasUnresolvedTokens(rawText, variableMap) {
            return resolveCommandText(rawText, variableMap).some(segment => segment.type === SegmentType.UNRESOLVED);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function formatNoteText(text) {
            const placeholders = [];

            // Extract code spans into placeholders so their content is protected
            let escaped = escapeHtml(text).replace(MarkdownToken.CODE_REGEX, (_, inner) => {
                const index = placeholders.length;
                placeholders.push(`<span class="note-code">${inner}</span>`);
                return `\x00CODE${index}\x00`;
            });

            // Bold
            escaped = escaped.replace(MarkdownToken.BOLD_REGEX, (_, inner) =>
                `<span class="note-bold">${inner}</span>`
            );

            // Italic
            escaped = escaped.replace(MarkdownToken.ITALIC_REGEX, (_, g1, g2) =>
                `<span class="note-italic">${g1 ?? g2}</span>`
            );

            // Links
            escaped = escaped.replace(MarkdownToken.URL_REGEX, (url) =>
                `<a href="${url}" class="note-link" target="${Anchor.TARGET_BLANK}" rel="${Anchor.REL}">${url}</a>`
            );

            // Restore code span placeholders
            escaped = escaped.replace(/\x00CODE(\d+)\x00/g, (_, i) => placeholders[Number(i)]);

            return escaped;
        }

        //  Variables

        async function addVariable() {
            if (isReadMode()) {
                return;
            }

            if (tabs.length === 0) {
                await createNewTab();
            }

            const newVariable = {
                id: generateId(),
                key: '',
                value: ''
            };
            state.variables.push(newVariable);

            saveState();
            renderVariablesList();

            // Focus the new key input
            const rows = document.querySelectorAll(Selector.VARIABLE_ROW);
            const lastRow = rows[rows.length - 1];
            if (lastRow) {
                lastRow.querySelector(Selector.VARIABLE_KEY_INPUT)?.focus();
            }
        }

        function removeVariable(variableId) {
            if (isReadMode()) {
                return;
            }

            state.variables = state.variables.filter(variable => variable.id !== variableId);
            saveState();
            renderVariablesList();
            refreshAllPreviews();
        }

        function updateVariable(variableId, field, value) {
            const variable = state.variables.find(variable => variable.id === variableId);
            if (!variable) {
                return;
            }

            if (field === VariableField.KEY) {
                const oldKey = variable.key.trim();
                const newKey = value.trim();

                if (oldKey && newKey && oldKey !== newKey) {
                    const oldToken = `{${oldKey}}`;
                    const newToken = `{${newKey}}`;

                    // Rename references inside blocks
                    for (const block of state.blocks) {
                        if (block.type === BlockType.COMMAND && block.text.includes(oldToken)) {
                            block.text = block.text.split(oldToken).join(newToken);
                        }
                    }

                    // Rename references inside variables
                    for (const otherVariable of state.variables) {
                        if (otherVariable.id !== variableId && otherVariable.value.includes(oldToken)) {
                            otherVariable.value = otherVariable.value.split(oldToken).join(newToken);

                            // Keep that variable's value input in sync
                            const otherRow = document.querySelector(
                                `${Selector.VARIABLE_ROW}[data-variable-id="${otherVariable.id}"]`);

                            const otherValueInput = otherRow?.querySelector(Selector.VARIABLE_VALUE_INPUT);
                            if (otherValueInput) {
                                otherValueInput.value = otherVariable.value;
                                otherValueInput.title = otherVariable.value;
                            }
                        }
                    }

                    renderBlocksList();
                }
            }

            variable[field] = value;
            debouncedSaveState();
            debouncedRefreshAllPreviews();
        }

        function renderVariablesList() {
            const variables = state.variables ?? [];
            const container = document.getElementById(ElementId.VARIABLES_LIST);
            container.innerHTML = '';

            if (variables.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = CssClass.SIDEBAR_SECTION_EMPTY_MSG;
                emptyMsg.textContent = 'No variables defined.';
                container.appendChild(emptyMsg);
                return;
            }

            const visibleVariables = variables.filter(variable =>
                matchesQuery(variableSearchQuery, variable.key, variable.value)
            );

            if (visibleVariables.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = CssClass.SIDEBAR_SECTION_EMPTY_MSG;
                emptyMsg.textContent = 'No matches.';
                container.appendChild(emptyMsg);
                return;
            }

            for (const variable of visibleVariables) {
                const row = document.createElement('div');
                row.className = CssClass.VARIABLE_ROW;
                row.dataset.variableId = variable.id;

                row.innerHTML = `
            <div class="variable-drag-handle" title="Drag to reorder">
              <svg viewBox="0 0 16 16"><circle cx="5" cy="4" r="1"/><circle cx="11" cy="4" r="1"/><circle cx="5" cy="8" r="1"/><circle cx="11" cy="8" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="11" cy="12" r="1"/></svg>
            </div>
            <div class="variable-inputs">
              <input
                class="variable-key-input"
                type="text"
                placeholder="key"
                value="${escapeHtml(variable.key)}"
                spellcheck="false"
                autocomplete="off"
                oninput="updateVariable('${variable.id}', '${VariableField.KEY}', this.value)"
                title="${escapeHtml(variable.key)}"
              />
              <input
                class="variable-value-input"
                type="text"
                placeholder="value"
                value="${escapeHtml(variable.value)}"
                spellcheck="false"
                autocomplete="off"
                oninput="updateVariable('${variable.id}', '${VariableField.VALUE}', this.value)"
                title="${escapeHtml(variable.value)}"
              />
            </div>
            <button
              class="btn btn-icon btn-danger"
              onclick="removeVariable('${variable.id}')"
              title="Remove variable"
            >
              <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M3 3l10 10M13 3L3 13"/>
              </svg>
            </button>
          `;
                makeRowReorderable(row, {
                    id: variable.id,
                    handle: row.querySelector(Selector.VARIABLE_DRAG_HANDLE),
                    highlightTarget: row.querySelector(Selector.VARIABLE_INPUTS),
                    stateKey: 'variable',
                    getItems: () => state.variables,
                    onReorder: () => {
                        saveState();
                        renderVariablesList();
                    }
                });

                container.appendChild(row);
            }
        }

        //  Blocks

        async function addBlock(blockType) {
            if (isReadMode()) {
                return;
            }

            if (tabs.length === 0) {
                await createNewTab();
            }

            let newBlock;

            if (blockType === BlockType.COMMAND) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.COMMAND,
                    text: ''
                };
            } else if (blockType === BlockType.NOTE) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.NOTE,
                    text: '',
                    style: NoteStyle.BODY
                };
            } else if (blockType === BlockType.DIVIDER) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.DIVIDER
                };
            }

            state.blocks.push(newBlock);
            saveState();
            renderBlocksList();
            updateEmptyState();
            autoResizeAllTextarea();

            // Focus the text area of the new block
            const allBlockElements = document.querySelectorAll(Selector.BLOCK_ITEM);
            const lastBlockElement = allBlockElements[allBlockElements.length - 1];
            if (lastBlockElement) {
                const textarea = lastBlockElement.querySelector(Selector.COMMAND_TEXTAREA) ??
                    lastBlockElement.querySelector(Selector.NOTE_TEXTAREA);
                if (textarea) {
                    textarea.focus();
                }
            }
        }

        function removeBlock(blockId) {
            if (isReadMode()) {
                return;
            }

            const idsToRemove = selectedBlockIds.size > 0 && selectedBlockIds.has(blockId) ?
                new Set(selectedBlockIds) :
                new Set([blockId]);

            state.blocks = state.blocks.filter(block => !idsToRemove.has(block.id));

            clearBlockSelection();
            saveState();
            renderBlocksList();
            updateEmptyState();
            autoResizeAllTextarea();
        }

        function duplicateBlock(blockId) {
            if (isReadMode()) {
                return;
            }

            const idsToDuplicate = selectedBlockIds.size > 0 && selectedBlockIds.has(blockId) ? [...selectedBlockIds]
                .sort((a, b) =>
                    state.blocks.findIndex(bl => bl.id === a) - state.blocks.findIndex(bl => bl.id === b)
                ) : [blockId];

            // Find the insertion point
            const lastId = idsToDuplicate[idsToDuplicate.length - 1];
            const lastIndex = state.blocks.findIndex(block => block.id === lastId);

            const duplicatedBlocks = idsToDuplicate.map(id => {
                const source = state.blocks.find(block => block.id === id);
                return source ? {
                    ...source,
                    id: generateId()
                } : null;
            }).filter(Boolean);

            state.blocks.splice(lastIndex + 1, 0, ...duplicatedBlocks);

            saveState();
            renderBlocksList();
            updateEmptyState();
            autoResizeAllTextarea();

            // Flash all duplicated blocks
            requestAnimationFrame(() => {
                duplicatedBlocks.forEach(block => {
                    const element = getBlockFromId(block.id);
                    if (!element) {
                        return;
                    }

                    element.classList.add(CssClass.DUPLICATE_FLASH);
                    element.addEventListener(EventType.ANIMATION_END, () => {
                        element.classList.remove(CssClass.DUPLICATE_FLASH);
                    }, {
                        once: true
                    });
                });
            });
        }

        function syncActiveRunbookLabel() {
            if (!activeRunbookId) {
                return;
            }

            const entry = runbookLibrary.find(item => item.id === activeRunbookId);
            if (!entry) {
                return;
            }

            const newLabel = getRunbookLabel(state.blocks, entry.filename || RunbookConfig.DEFAULT_LABEL);
            if (newLabel === entry.label) {
                return;
            }

            entry.label = newLabel;
            saveRunbookLibrary();
            renderRunbookList();

            // Update tab label
            const tab = activeTab();
            if (tab) {
                tab.label = newLabel;
                renderTabsBar();
            }
        }

        function updateBlockText(blockId, text) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block) {
                return;
            }

            block.text = text;
            debouncedSaveState();

            if (block.type === BlockType.COMMAND) {
                refreshBlockPreview(blockId, getVariableMap());
            } else if (block.type === BlockType.NOTE) {
                refreshNotePreview(blockId);
            }

            // Update runbook label
            if (blockId === state.blocks[0]?.id) {
                debouncedSyncActiveRunbookLabel();
            }
        }

        function getBlockFromId(blockId) {
            return document.querySelector(`[data-block-id="${blockId}"]`);
        }

        function updateBlockStyle(blockId, style) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.NOTE) {
                return;
            }

            block.style = style;
            saveState();

            const blockElement = getBlockFromId(blockId);
            if (!blockElement) {
                return;
            }

            const textarea = blockElement.querySelector(Selector.NOTE_TEXTAREA);
            const label = blockElement.querySelector(Selector.NOTE_AUTO_WIDTH);
            const preview = blockElement.querySelector(Selector.NOTE_PREVIEW);

            if (textarea) {
                textarea.className = `note-textarea style-${style}`;
            }
            if (label) {
                label.className = `note-auto-width style-${style}`;
            }
            if (preview) {
                preview.className = `note-preview style-${style}`;
            }

            blockElement.querySelectorAll(Selector.NOTE_STYLE_BTN).forEach(button => {
                button.classList.toggle(CssClass.ACTIVE, button.dataset.style === style);
            });

            refreshNotePreview(blockId);
        }

        function moveBlock(blockId, direction) {
            const index = state.blocks.findIndex(block => block.id === blockId);
            if (index < 0) {
                return;
            }

            const targetIndex = direction === MoveDirection.UP ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= state.blocks.length) {
                return;
            }

            [state.blocks[index], state.blocks[targetIndex]] = [state.blocks[targetIndex], state.blocks[index]];

            saveState();
            renderBlocksList();
        }

        function refreshBlockPreview(blockId, variableMap) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) {
                return;
            }

            const blockElement = getBlockFromId(blockId);
            if (!blockElement) {
                return;
            }

            const previewEl = blockElement.querySelector(Selector.COMMAND_PREVIEW_TEXT);
            if (!previewEl) {
                return;
            }

            previewEl.innerHTML = buildPreviewHTML(block.text, variableMap);
            const isUnresolved = hasUnresolvedTokens(block.text, variableMap);
            previewEl.classList.toggle(CssClass.HAS_UNRESOLVED, isUnresolved);

            // Auto-resize textarea
            const textarea = blockElement.querySelector(Selector.COMMAND_TEXTAREA);
            if (textarea) {
                autoResizeTextarea(textarea);
            }
        }

        function getNotePlaceholder(style) {
            return `Section ${style}...`;
        }

        function refreshNotePreview(blockId) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.NOTE) {
                return;
            }

            const blockElement = getBlockFromId(blockId);
            if (!blockElement) {
                return;
            }

            const previewEl = blockElement.querySelector(Selector.NOTE_PREVIEW);
            if (!previewEl) {
                return;
            }

            const noteStyle = block.style || NoteStyle.BODY;
            previewEl.innerHTML = block.text ?
                formatNoteText(block.text) :
                `<span class="note-preview-placeholder">${getNotePlaceholder(noteStyle)}</span>`;
        }

        function refreshAllPreviews() {
            const blocks = state.blocks ?? [];
            const variableMap = getVariableMap();

            for (const block of blocks) {
                if (block.type !== BlockType.COMMAND) {
                    continue;
                }

                refreshBlockPreview(block.id, variableMap);
            }
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = CssHeight.AUTO;
            textarea.style.height = `${textarea.scrollHeight}px`;
        }

        function autoResizeAllTextarea() {
            document.querySelectorAll(Selector.COMMAND_TEXTAREA).forEach(autoResizeTextarea);
        }

        function syncNoteWidth(textarea) {
            const label = textarea.closest(Selector.NOTE_AUTO_WIDTH);
            if (label) {
                label.dataset.value = textarea.value || textarea.placeholder;
            }
        }

        //  Block rendering

        function renderBlocksList() {
            const blocks = state.blocks ?? [];
            const container = document.getElementById(ElementId.BLOCKS_LIST);
            container.innerHTML = '';
            const variableMap = getVariableMap();

            for (const block of blocks) {
                const blockElement = buildBlockElement(block, variableMap);
                container.appendChild(blockElement);
            }

            updateBlockSelectionVisuals();
            setupDragAndDrop();
        }

        function buildBlockElement(block, variableMap) {
            const wrapper = document.createElement('div');
            wrapper.className = CssClass.BLOCK_ITEM;
            wrapper.dataset.blockId = block.id;

            if (block.type === BlockType.COMMAND) {
                wrapper.innerHTML = buildCommandBlockHTML(block, variableMap);
            } else if (block.type === BlockType.NOTE) {
                wrapper.innerHTML = buildNoteBlockHTML(block);
            } else if (block.type === BlockType.DIVIDER) {
                wrapper.innerHTML = buildDividerBlockHTML(block);
            }

            // Left side: drag handle
            const dragHandleEl = document.createElement('div');
            dragHandleEl.className = CssClass.BLOCK_DRAG_HANDLE;
            dragHandleEl.innerHTML = `
      <div class="drag-handle" title="Drag to reorder">
        <svg viewBox="0 0 16 16" width="14" height="14"><circle cx="5" cy="4" r="1"/><circle cx="11" cy="4" r="1"/><circle cx="5" cy="8" r="1"/><circle cx="11" cy="8" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="11" cy="12" r="1"/></svg>
      </div>
    `;
            wrapper.appendChild(dragHandleEl);

            // Right side: delete and duplicate
            const sideControls = document.createElement('div');
            sideControls.className = CssClass.BLOCK_CONTROLS;
            sideControls.innerHTML = `
      <button class="btn btn-icon" onclick="duplicateBlock('${block.id}')" title="Duplicate block">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="2" width="9" height="9" rx="1" />
        <path d="M12 10v4M10 12h4" />
        </svg>
      </button>
      <button class="btn btn-icon btn-danger" onclick="removeBlock('${block.id}')" title="Delete block">
        <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg>
      </button>
    `;
            wrapper.appendChild(sideControls);

            let dragInitiatedFromHandle = false;
            const dragHandle = dragHandleEl.querySelector(Selector.DRAG_HANDLE);

            dragHandle.addEventListener(EventType.MOUSE_DOWN, () => {
                wrapper.draggable = true;
                dragInitiatedFromHandle = true;
            });

            wrapper.addEventListener(EventType.DRAG_START, event => {
                if (dragInitiatedFromHandle) {
                    dragInitiatedFromHandle = false;
                    return;
                }

                event.preventDefault();
                event.stopPropagation();
                wrapper.draggable = false;
            });

            wrapper.addEventListener(EventType.DRAG_END, () => {
                wrapper.draggable = false;
                dragInitiatedFromHandle = false;
            });

            dragHandle.addEventListener(EventType.MOUSE_UP, () => {
                setTimeout(() => {
                    wrapper.draggable = false;
                    dragInitiatedFromHandle = false;
                }, DRAG_TIMEOUT_MS);
            });

            wrapper.addEventListener(EventType.MOUSE_ENTER, event => {
                if (!isLassoActive || isReadMode()) {
                    return;
                }

                if (lassoMode === LassoMode.DESELECT) {
                    selectedBlockIds.delete(block.id);
                } else {
                    selectedBlockIds.add(block.id);
                }

                updateBlockSelectionVisuals();
                updateSelectingBodyClass();
            });

            return wrapper;
        }

        function buildCommandBlockHTML(block, variableMap = getVariableMap()) {
            const previewHTML = buildPreviewHTML(block.text, variableMap);
            const isUnresolved = hasUnresolvedTokens(block.text, variableMap);
            const escapedText = escapeHtml(block.text);
            const isEditorCollapsed = block.editorCollapsed === true;

            return `
      <div class="command-block">
        <div class="command-preview">
          <span class="command-preview-text ${isUnresolved ? CssClass.HAS_UNRESOLVED : ''}">${previewHTML || '<span class="command-preview-placeholder">empty command</span>'}</span>
          <button class="btn btn-icon toggle-editor-btn ${isEditorCollapsed ? CssClass.EDITOR_COLLAPSED : ''}"
            onclick="toggleCommandEditor('${block.id}')"
            title="${isEditorCollapsed ? 'Show' : 'Hide'} editor"
          >
            <svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>
          </button>
          <button class="btn" id="copy-btn-${block.id}" onclick="copyCommand('${block.id}')" title="Copy command">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M3 11V2h9"/></svg>
          </button>
        </div>
        <div class="command-block-editor${isEditorCollapsed ? ` ${CssClass.COLLAPSED}` : ''}">
          <div class="command-gutter">
            <span class="command-gutter-prefix">$</span>
          </div>
          <textarea
            class="command-textarea"
            placeholder="ssh {USER}@{HOST}"
            spellcheck="false"
            autocomplete="off"
            rows="1"
            oninput="updateBlockText('${block.id}', this.value); autoResizeTextarea(this)"
          >${escapedText}</textarea>
        </div>
      </div>
    `;
        }

        function buildNoteBlockHTML(block) {
            const noteStyle = block.style || NoteStyle.BODY;
            const escapedText = escapeHtml(block.text);
            const previewHTML = formatNoteText(block.text);
            const notePlaceholder = getNotePlaceholder(noteStyle);

            return `
      <div class="note-block">
        <div class="note-style-row">
          ${[NoteStyle.HEADING, NoteStyle.SUBHEADING, NoteStyle.BODY].map(style => `
            <button
              class="note-style-btn ${noteStyle === style ? CssClass.ACTIVE : ''}"
              data-style="${style}"
              onclick="updateBlockStyle('${block.id}', '${style}')"
            >${style}</button>
          `).join('')}
        </div>
        <label class="note-auto-width style-${noteStyle}" data-value="${block.text || notePlaceholder}">
          <textarea
            class="note-textarea style-${noteStyle}"
            placeholder="${notePlaceholder}"
            spellcheck="false"
            rows="1"
            oninput="updateBlockText('${block.id}', this.value); syncNoteWidth(this)"
            onfocus="this.closest('.note-block').classList.add('${CssClass.IS_FOCUSED}')"
            onblur="this.closest('.note-block').classList.remove('${CssClass.IS_FOCUSED}')"
          >${escapedText}</textarea>
          <div class="note-preview style-${noteStyle}">${previewHTML || `<span class="note-preview-placeholder">${notePlaceholder}</span>`}</div>
        </label>
      </div>
    `;
        }

        function buildDividerBlockHTML(block) {
            return `
      <div class="divider-block">
        <div class="divider-line"></div>
      </div>
    `;
        }

        function updateEmptyState() {
            const isEmpty = (state.blocks ?? []).length === 0;
            const emptyState = document.getElementById(ElementId.EMPTY_STATE);

            if (emptyState) {
                emptyState.style.display = isEmpty ? CssDisplay.BLOCK : CssDisplay.NONE;
            }

            if (isEmpty) {
                clearBlockSelection();
            }

            [ElementId.COLLAPSE_ALL_BTN, ElementId.EXPORT_BTN].forEach(id => {
                const btn = document.getElementById(id);
                if (!btn) {
                    return;
                }

                btn.toggleAttribute(CssAttribute.DISABLED, isEmpty);
                btn.classList.toggle(CssClass.BTN_DISABLED, isEmpty);
            });
        }

        //  Copy to clipboard

        function copyCommand(blockId) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) {
                return;
            }

            const resolvedText = resolveCommandToString(block.text, getVariableMap());

            navigator.clipboard.writeText(resolvedText).then(() => {
                const btn = document.getElementById(`copy-btn-${blockId}`);
                if (!btn) {
                    return;
                }

                const svg = getSvgFromButton(btn);
                const originalSvg = svg.cloneNode(true);

                svg.innerHTML =
                    '<polyline points="2,8 6,12 14,4" stroke="var(--success)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';

                setTimeout(() => {
                    const currentSvg = getSvgFromButton(btn);
                    if (currentSvg) {
                        currentSvg.replaceWith(originalSvg);
                    }
                }, COPY_FEEDBACK_TIMEOUT_MS);
            });
        }

        //  Sidebar functions

        function toggleSidebar() {
            const shell = document.getElementById(ElementId.APP_SHELL);
            const isCollapsed = shell.classList.toggle(CssClass.SIDEBAR_COLLAPSED);

            const btn = document.getElementById(ElementId.SIDEBAR_TOGGLE_BTN);
            btn.title = `${isCollapsed ? 'Expand' : 'Collapse'} sidebar`;

            saveState();
        }

        function toggleSidebarPosition() {
            const shell = document.getElementById(ElementId.APP_SHELL);
            const isRight = shell.classList.toggle(CssClass.SIDEBAR_RIGHT);
            const btn = document.getElementById(ElementId.SIDEBAR_POSITION_BTN);
            if (btn) {
                btn.title = `Move sidebar to ${isRight ? 'left' : 'right'}`;
            }

            saveState();
        }

        //  Toggle command editor

        function toggleCommandEditor(blockId) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) {
                return;
            }

            block.editorCollapsed = !block.editorCollapsed;
            saveState();

            const blockElement = getBlockFromId(blockId);
            if (!blockElement) {
                return;
            }

            const editorEl = blockElement.querySelector(Selector.COMMAND_BLOCK_EDITOR);
            const toggleBtn = blockElement.querySelector(Selector.TOGGLE_EDITOR_BTN);

            if (editorEl) editorEl.classList.toggle(CssClass.COLLAPSED, block.editorCollapsed);
            if (toggleBtn) {
                toggleBtn.classList.toggle(CssClass.EDITOR_COLLAPSED, block.editorCollapsed);
                toggleBtn.title = `${block.editorCollapsed ? 'Show' : 'Hide'} editor`;
            }

            if (block.editorCollapsed) {
                return
            }

            // Auto-resize textarea
            const textarea = editorEl.querySelector(Selector.COMMAND_TEXTAREA);
            if (textarea) {
                autoResizeTextarea(textarea);
            }
        }

        // Multi select

        let lassoMode = LassoMode.SELECT;
        let isLassoActive = false;
        let selectedBlockIds = new Set();

        function isBlockSelected(blockId) {
            return selectedBlockIds.has(blockId);
        }

        function toggleBlockSelection(blockId) {
            if (selectedBlockIds.has(blockId)) {
                selectedBlockIds.delete(blockId);
            } else {
                selectedBlockIds.add(blockId);
            }

            updateBlockSelectionVisuals();
            updateSelectingBodyClass();
        }

        function clearBlockSelection() {
            selectedBlockIds.clear();
            updateBlockSelectionVisuals();
            updateSelectingBodyClass();
        }

        function updateBlockSelectionVisuals() {
            document.querySelectorAll(Selector.BLOCK_ITEM).forEach(el => {
                el.classList.toggle(CssClass.BLOCK_SELECTED, selectedBlockIds.has(el.dataset.blockId));
            });
        }

        function updateSelectingBodyClass() {
            document.body.classList.toggle(CssClass.SELECTING, selectedBlockIds.size > 0);
        }

        function setupLassoSelection() {
            document.addEventListener(EventType.MOUSE_DOWN, e => {
                if (!(e.ctrlKey || e.metaKey) || e.button !== 0 || isReadMode()) {
                    return;
                }

                const blockEl = e.target.closest(Selector.BLOCK_ITEM);
                if (blockEl) {
                    const blockId = blockEl.dataset.blockId;
                    lassoMode = selectedBlockIds.has(blockId) ? LassoMode.DESELECT : LassoMode.SELECT;

                    if (lassoMode === LassoMode.DESELECT) {
                        selectedBlockIds.delete(blockId);
                    } else {
                        selectedBlockIds.add(blockId);
                    }

                    updateBlockSelectionVisuals();
                    updateSelectingBodyClass();
                } else {
                    lassoMode = LassoMode.SELECT;
                }

                isLassoActive = true;
            });

            document.addEventListener(EventType.MOUSE_UP, () => {
                isLassoActive = false;
            });
        }

        //  Drag and drop reordering

        let dragSourceId = null;

        function setupDragAndDrop() {
            const container = document.getElementById(ElementId.BLOCKS_LIST);

            container.querySelectorAll(Selector.BLOCK_ITEM).forEach(blockElement => {
                blockElement.addEventListener(EventType.DRAG_START, event => {
                    if (!blockElement.draggable) {
                        event.preventDefault();
                        return;
                    }

                    dragSourceId = blockElement.dataset.blockId;
                    blockElement.classList.add(CssClass.DRAGGING);
                    event.dataTransfer.effectAllowed = DragEffect.MOVE;
                });

                blockElement.addEventListener(EventType.DRAG_OVER, event => {
                    event.preventDefault();
                    if (blockElement.dataset.blockId !== dragSourceId) {
                        container.querySelectorAll(Selector.BLOCK_ITEM).forEach(el => el.classList
                            .remove(
                                CssClass.DRAG_OVER));
                        blockElement.classList.add(CssClass.DRAG_OVER);
                    }
                });

                blockElement.addEventListener(EventType.DROP, event => {
                    event.preventDefault();
                    if (isReadMode()) {
                        return;
                    }

                    const targetId = blockElement.dataset.blockId;
                    if (!dragSourceId || dragSourceId === targetId) {
                        return;
                    }

                    // Move all selected blocks
                    const movingIds = selectedBlockIds.size > 0 && selectedBlockIds.has(dragSourceId) ?
                        [...selectedBlockIds] : [dragSourceId];

                    // Capture source and target indices BEFORE any mutation
                    const targetIndex = state.blocks.findIndex(block => block.id === targetId);
                    const sourceIndex = state.blocks.findIndex(block => block.id === dragSourceId);
                    if (sourceIndex < 0 || targetIndex < 0) {
                        return;
                    }

                    const movingBlocks = movingIds
                        .map(id => state.blocks.find(block => block.id === id))
                        .filter(Boolean)
                        .sort((a, b) => state.blocks.indexOf(a) - state.blocks.indexOf(b));

                    // Remove moving blocks
                    state.blocks = state.blocks.filter(block => !movingIds.includes(block.id));

                    // Recalculate target index after removal
                    const newTargetIndex = state.blocks.findIndex(block => block.id === targetId);
                    const insertIndex = sourceIndex < targetIndex ? newTargetIndex + 1 : newTargetIndex;

                    // Insert all at the new position
                    state.blocks.splice(insertIndex, 0, ...movingBlocks);

                    saveState();
                    renderBlocksList();
                    updateEmptyState();
                    autoResizeAllTextarea();
                    updateBlockSelectionVisuals();
                });
            });
        }

        //  Export

        function buildMarkdownExport() {
            const lines = [];

            for (const block of state.blocks) {
                if (block.type === BlockType.NOTE) {
                    const style = block.style || NoteStyle.BODY;
                    const text = block.text || '';

                    if (style === NoteStyle.HEADING) {
                        lines.push(`${MarkdownSyntax.HEADING} ${text}`);
                    } else if (style === NoteStyle.SUBHEADING) {
                        lines.push(`${MarkdownSyntax.SUBHEADING} ${text}`);
                    } else {
                        lines.push(text);
                    }
                } else if (block.type === BlockType.COMMAND) {
                    const resolved = resolveCommandToString(block.text || '', getVariableMap());
                    lines.push(MarkdownSyntax.CODE_FENCE);
                    lines.push(resolved);
                    lines.push(MarkdownSyntax.CODE_FENCE_END);
                } else if (block.type === BlockType.DIVIDER) {
                    lines.push(MarkdownSyntax.DIVIDER);
                }

                lines.push('');
            }

            return lines.join('\n');
        }

        // Shared file save utility
        async function saveFile(content, mimeType, suggestedName, types) {
            if (window.showSaveFilePicker) {
                try {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName,
                        types
                    });
                    const writable = await fileHandle.createWritable();
                    await writable.write(content);
                    await writable.close();
                    return;
                } catch (error) {
                    if (error.name === 'AbortError') return;
                }
            }

            // Legacy fallback
            const blob = new Blob([content], {
                type: mimeType
            });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = suggestedName;
            anchor.click();
            URL.revokeObjectURL(url);
        }

        // Keybindings modal

        function buildKeybindingsTable() {
            const table = document.getElementById(ElementId.KEYBINDINGS_TABLE);
            if (!table || table.childElementCount > 0) {
                return;
            }

            table.innerHTML = KEYBINDINGS.map(({
                keys,
                description
            }) => `
                <tr>
                    <td class="key-cell"><span class="kbd">${escapeHtml(keys)}</span></td>
                    <td class="desc-cell">${escapeHtml(description)}</td>
                </tr>
            `).join('');
        }

        function showKeybindingsModal() {
            buildKeybindingsTable();
            const backdrop = document.getElementById(ElementId.KEYBINDINGS_MODAL);
            backdrop.classList.add(CssClass.MODAL_VISIBLE);

            function onKey(event) {
                if (event.key === Key.ESCAPE) {
                    event.preventDefault();
                    cleanup();
                }
            }

            function onBackdropClick(event) {
                if (event.target === backdrop) {
                    cleanup();
                }
            }

            function cleanup() {
                closeKeybindingsModal();
                document.removeEventListener(EventType.KEY_DOWN, onKey);
                backdrop.removeEventListener(EventType.CLICK, onBackdropClick);
            }

            document.addEventListener(EventType.KEY_DOWN, onKey);
            backdrop.addEventListener(EventType.CLICK, onBackdropClick);
        }

        function closeKeybindingsModal() {
            document.getElementById(ElementId.KEYBINDINGS_MODAL).classList.remove(CssClass.MODAL_VISIBLE);
        }

        // Export modal

        function closeExportModal() {
            document.getElementById(ElementId.EXPORT_MODAL).classList.remove(CssClass.MODAL_VISIBLE);
        }

        function showExportModal() {
            const backdrop = document.getElementById(ElementId.EXPORT_MODAL);
            backdrop.classList.add(CssClass.MODAL_VISIBLE);

            function cleanup() {
                closeExportModal();
                document.removeEventListener(EventType.KEY_DOWN, onKey);
                backdrop.removeEventListener(EventType.CLICK, onBackdropClick);
            }

            function onKey(event) {
                if (event.key === Key.ESCAPE) {
                    event.preventDefault();
                    cleanup();
                }
            }

            function onBackdropClick(event) {
                if (event.target === backdrop) {
                    cleanup();
                }
            }

            document.addEventListener(EventType.KEY_DOWN, onKey);
            backdrop.addEventListener(EventType.CLICK, onBackdropClick);
        }

        async function runExport(format) {
            closeExportModal();

            if (format === ExportFormat.JSON) {
                const exportData = {
                    variables: state.variables ?? [],
                    blocks: state.blocks ?? []
                };

                await saveFile(
                    JSON.stringify(exportData, null, 2),
                    FilePickerConfig.MIME_TYPE,
                    FilePickerConfig.SUGGESTED_NAME,
                    [{
                        description: FilePickerConfig.DESCRIPTION,
                        accept: {
                            [FilePickerConfig.MIME_TYPE]: [FilePickerConfig.EXTENSION]
                        }
                    }]
                );

                return;
            }

            const content = buildMarkdownExport();

            if (format === ExportFormat.MD) {
                await saveFile(
                    content,
                    FilePickerConfig.MD_MIME_TYPE,
                    FilePickerConfig.MD_SUGGESTED_NAME,
                    [{
                        description: FilePickerConfig.MD_DESCRIPTION,
                        accept: {
                            [FilePickerConfig.MD_MIME_TYPE]: [FilePickerConfig.MD_EXTENSION]
                        }
                    }]
                );

                return;
            }

            if (format === ExportFormat.TXT) {
                await saveFile(
                    content,
                    FilePickerConfig.TXT_MIME_TYPE,
                    FilePickerConfig.TXT_SUGGESTED_NAME,
                    [{
                        description: FilePickerConfig.TXT_DESCRIPTION,
                        accept: {
                            [FilePickerConfig.TXT_MIME_TYPE]: [FilePickerConfig.TXT_EXTENSION]
                        }
                    }]
                );
            }
        }

        //  Clear workspace modal

        function showConfirmModal(message) {
            return new Promise(resolve => {
                const backdrop = document.getElementById(ElementId.CONFIRM_MODAL);
                const messageEl = document.getElementById(ElementId.CONFIRM_MODAL_MESSAGE);
                const confirmBtn = document.getElementById(ElementId.CONFIRM_MODAL_CONFIRM_BTN);
                const cancelBtn = document.getElementById(ElementId.CONFIRM_MODAL_CANCEL_BTN);

                messageEl.textContent = message;
                backdrop.classList.add(CssClass.MODAL_VISIBLE);
                confirmBtn.focus();

                function finish(result) {
                    backdrop.classList.remove(CssClass.MODAL_VISIBLE);
                    confirmBtn.removeEventListener(EventType.CLICK, onConfirm);
                    cancelBtn.removeEventListener(EventType.CLICK, onCancel);
                    backdrop.removeEventListener(EventType.CLICK, onBackdropClick);
                    document.removeEventListener(EventType.KEY_DOWN, onKey);
                    resolve(result);
                }

                function onConfirm() {
                    finish(true);
                }

                function onCancel() {
                    finish(false);
                }

                function onBackdropClick(event) {
                    if (event.target === backdrop) {
                        finish(false);
                    }
                }

                function onKey(event) {
                    if (event.key === Key.ESCAPE) {
                        event.preventDefault();
                        finish(false);
                    } else if (event.key === Key.ENTER) {
                        event.preventDefault();
                        finish(true);
                    }
                }

                confirmBtn.addEventListener(EventType.CLICK, onConfirm);
                cancelBtn.addEventListener(EventType.CLICK, onCancel);
                backdrop.addEventListener(EventType.CLICK, onBackdropClick);
                document.addEventListener(EventType.KEY_DOWN, onKey);
            });
        }

        async function clearAllData() {
            removeCtrlHeldClass();

            const confirmed = await showConfirmModal(
                'Delete all variables, blocks, and runbooks? This action cannot be undone.'
            );
            if (!confirmed) {
                return;
            }

            for (const runbook of runbookLibrary) {
                await deleteRunbookContent(runbook.id);
            }

            activeTabId = null;
            activeRunbookId = null;

            tabs = []
            runbookLibrary = [];

            saveTabs();
            saveRunbookLibrary();

            renderWorkspace();
        }

        function toggleAllCommandEditors() {
            if (isReadMode()) {
                return;
            }

            const allCollapsed = state.blocks
                .filter(block => block.type === BlockType.COMMAND)
                .every(block => block.editorCollapsed === true);

            const newState = !allCollapsed;

            for (const block of state.blocks) {
                if (block.type === BlockType.COMMAND) {
                    block.editorCollapsed = newState;
                }
            }

            saveState();
            renderBlocksList();
            autoResizeAllTextarea();
        }

        //  Bootstrap

        function setupGlobalDragCleanup() {
            document.addEventListener(EventType.DRAG_END, () => {
                document.querySelectorAll(Selector.BLOCK_ITEM)
                    .forEach(el => el.classList.remove(CssClass.DRAG_OVER, CssClass.DRAGGING));

                document.querySelectorAll(Selector.VARIABLE_ROW)
                    .forEach(el => {
                        el.classList.remove(CssClass.DRAGGING);
                        el.querySelector(Selector.VARIABLE_INPUTS)?.classList.remove(CssClass.DRAG_OVER);
                    });

                document.querySelectorAll(Selector.RUNBOOK_ROW)
                    .forEach(el => {
                        el.classList.remove(CssClass.DRAGGING);
                        el.querySelector(Selector.RUNBOOK_ITEM_BTN)?.classList.remove(CssClass.DRAG_OVER);
                    });
            });
        }

        async function init() {
            loadState();
            loadRunbookLibrary();
            loadSidebarSectionState();
            await loadTabs()
            renderWorkspace();
            setupLassoSelection();
            setupGlobalDragCleanup();

            setTimeout(() => {
                autoResizeAllTextarea();
                document.querySelectorAll(Selector.NOTE_TEXTAREA).forEach(t => syncNoteWidth(t));
                refreshAllPreviews();

                // Restore scroll
                setTimeout(() => {
                    const tabsContent = document.getElementById(ElementId.TABS_CONTENT);
                    if (tabsContent) {
                        tabsContent.scrollTop = savedScrollTop;
                    }

                    appInitialized = true;
                    requestAnimationFrame(() => {
                        document.body.classList.add(CssClass.APP_READY);
                    });
                }, DEFER_MS);
            }, DEFER_MS);
        }

        // Persist scrollbar position

        let scrollSaveTimer = null;

        document.getElementById(ElementId.TABS_CONTENT).addEventListener(EventType.SCROLL, () => {
            clearTimeout(scrollSaveTimer);
            scrollSaveTimer = setTimeout(saveUiState, DEBOUNCE_SAVE_MS);
        });

        // Click handlers

        let mouseX = 0;
        let mouseY = 0;

        function updateCursorOnLink() {
            const isCursorOverLink = document.elementsFromPoint(mouseX, mouseY)
                .some(el => el.matches(Selector.NOTE_LINK));

            document.body.style.cursor = isCursorOverLink ? Cursor.POINTER : Cursor.DEFAULT;
        }

        function removeCtrlHeldClass() {
            document.body.classList.remove(CssClass.CTRL_HELD);
        }

        function removeAltHeldClass() {
            document.body.classList.remove(CssClass.ALT_HELD);
            document.body.style.cursor = Cursor.DEFAULT;
        }

        document.addEventListener(EventType.MOUSE_MOVE, e => {
            mouseX = e.clientX;
            mouseY = e.clientY;

            if (e.altKey) {
                updateCursorOnLink();
            }
        });

        document.addEventListener(EventType.KEY_DOWN, e => {
            const key = e.key;
            const altPressed = e.altKey;
            const ctrlPressed = e.ctrlKey;

            // Tab management
            if ((ctrlPressed || e.metaKey) && altPressed) {
                if (key === Key.N) {
                    e.preventDefault();
                    createNewTab();
                } else if (key === Key.W) {
                    e.preventDefault();
                    if (activeTabId) {
                        closeTab(activeTabId);
                    }
                }

                return;
            }

            if (!ctrlPressed && !altPressed && !document.activeElement?.matches(InputSelector.EDITABLE)) {
                if (key === Key.DELETE && selectedBlockIds.size > 0) {
                    e.preventDefault();
                    removeBlock([...selectedBlockIds][0]);
                } else if (key === Key.TAB && runbookLibrary.length > 0) {
                    e.preventDefault();
                    const targetId = activeRunbookId ?? runbookLibrary[0].id;
                    setRunbookFocus(targetId);
                } else if ((key === Key.ARROW_DOWN || key === Key.ARROW_UP) && focusedRunbookId !== null) {
                    e.preventDefault();
                    navigateRunbookList(key);
                }

                return;
            }

            if (altPressed) {
                e.preventDefault();
                document.body.classList.add(CssClass.ALT_HELD);
                updateCursorOnLink();
                return;
            }

            if (!ctrlPressed) {
                return;
            }

            if (key === Key.E) {
                e.preventDefault();
                removeCtrlHeldClass();
                toggleAppMode();

            } else if (e.shiftKey && key === Key.SHIFT_E) {
                e.preventDefault();
                removeCtrlHeldClass();

                const exportBtn = document.getElementById(ElementId.EXPORT_BTN);
                if (!exportBtn?.hasAttribute(CssAttribute.DISABLED)) {
                    showExportModal();
                }

            } else if (e.shiftKey && key === Key.BACKSPACE) {
                e.preventDefault();
                removeCtrlHeldClass();
                clearAllData();

            } else if (key === Key.D) {
                e.preventDefault();
                removeCtrlHeldClass();
                if (selectedBlockIds.size > 0) {
                    duplicateBlock([...selectedBlockIds][0]);
                }

            } else if (e.shiftKey && key === Key.SHIFT_S) {
                e.preventDefault();
                removeCtrlHeldClass();
                toggleSidebarPosition();

            } else if (key === Key.S) {
                e.preventDefault();
                removeCtrlHeldClass();
                toggleSidebar();

            } else if (key === Key.I && !isReadMode()) {
                e.preventDefault();
                removeCtrlHeldClass();
                openRunbookImportDialog();

            } else if (key === Key.G) {
                e.preventDefault();
                removeCtrlHeldClass();
                toggleAllCommandEditors();

            } else if (!document.activeElement?.matches(InputSelector.EDITABLE)) {
                document.body.classList.add(CssClass.CTRL_HELD);
            }
        });

        document.addEventListener(EventType.KEY_UP, e => {
            const key = e.key;
            if (key === Key.CTRL) {
                removeCtrlHeldClass();
                return;
            }

            if (key === Key.ALT) {
                removeAltHeldClass();
                return;
            }

            if (key === Key.ESCAPE) {
                clearUserInteraction();
            }
        });

        document.addEventListener(EventType.CLICK, e => {
            // Open note links
            if (e.altKey) {
                const noteLink = document.elementsFromPoint(e.clientX, e.clientY)
                    .find(el => el.matches(Selector.NOTE_LINK));

                if (!noteLink) {
                    return;
                }

                e.preventDefault();
                removeAltHeldClass();
                window.open(noteLink.href, Anchor.TARGET_BLANK, Anchor.REL);
                return;
            }

            if (e.ctrlKey || e.metaKey) {
                return;
            }

            // Clear runbook focus unless on runbook item
            if (focusedRunbookId !== null && !e.target.closest(Selector.RUNBOOK_ITEM_BTN)) {
                clearRunbookFocus();
            }

            // Clear selection unless on block controls
            if (
                selectedBlockIds.size > 0 &&
                !e.target.closest(`.${CssClass.BLOCK_CONTROLS}, .${CssClass.BLOCK_DRAG_HANDLE}`)
            ) {
                clearBlockSelection();
            }
        });

        init();
    </script>
</body>
