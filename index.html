<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommandPad</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0c'/><text x='4' y='23' font-family='monospace' font-size='20' font-weight='bold' fill='%2334d399'>$_</text></svg>">
    <style>
        :root {
            /* Core config */
            --base-unit: 17px;
            --font-sans: 'Inter', sans-serif;
            --font-mono: 'Cascadia Code', monospace;

            /* Accents & semantic colors */
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --accent-text: #93c5fd;
            --success: #34d399;
            --danger: #f87171;
            --danger-dim: rgba(248, 113, 113, 0.12);
            --tag-bg: rgba(59, 130, 246, 0.1);

            /* Surfaces */
            --color-bg: #0a0a0c;
            --color-surface: #111114;
            --color-surface-alt: #18181d;
            --color-border: #232329;
            --color-border-focus: #3b82f6;

            /* Text */
            --color-text-primary: #f1f2f4;
            --color-text-secondary: #8b8d98;
            --color-text-muted: #3f4150;

            /* Note text styles */
            --code-color: #ff9800;
            --code-bg: rgba(255, 152, 0, 0.08);
            --code-border: rgba(255, 152, 0, 0.2);
            --selection-color: #0338a2;

            /* Space scale */
            --space-1: 0.125rem;
            --space-2: 0.25rem;
            --space-3: 0.375rem;
            --space-4: 0.5rem;
            --space-5: 0.625rem;
            --space-6: 0.75rem;
            --space-8: 1rem;
            --space-10: 1.25rem;
            --space-12: 1.5rem;
            --space-14: 1.75rem;
            --space-16: 2rem;
            --space-20: 2.5rem;

            /* Text scale */
            --text-xs: 0.6875rem;
            --text-sm: 0.8125rem;
            --text-md: 0.875rem;
            --text-base: 1rem;
            --text-xl: 1.125rem;
            --text-lg: 1.5rem;

            /* Radius scale */
            --radius-sm: 0.25rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.625rem;
            --radius-pill: 1rem;

            /* Icon scale */
            --icon-sm: 0.75rem;
            --icon-md: 0.875rem;
            --icon-base: 1rem;
            --icon-lg: 2.875rem;

            /* Layout dimensions */
            --sidebar-width: 18.75rem;
            --header-height: 3.5rem;
            --scrollbar-size: 0.625rem;
            --tab-max-width: 12rem;
            --block-min-width: 7.5rem;
            --modal-min-width: 15rem;
            --modal-max-width: 30rem;

            /* --- Misc & utilities --- */
            --white-a10: rgba(255, 255, 255, 0.1);
            --black-a40: rgba(0, 0, 0, 0.4);
            --black-a50: rgba(0, 0, 0, 0.5);

            /* Compound tokens */
            --border-standard: 1px solid var(--color-border);
            --border-dashed: var(--space-1) dashed var(--accent);
            --transition-fast: 0.15s;
            --transition-base: 0.2s;
        }

        /* --- BASE --- */

        html {
            font-size: var(--base-unit);
            box-sizing: border-box;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
            visibility: hidden;
        }

        body.app-ready {
            visibility: visible;
        }

        /* --- DISABLE USER SELECT --- */

        .btn,
        .tab,
        .no-user-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* --- SCROLLBAR --- */

        ::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-md);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-muted);
        }

        /* --- LAYOUT --- */

        #app-shell {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
            grid-template-areas:
                "header header"
                "sidebar main";
            height: 100vh;
            overflow: hidden;
        }

        #app-shell.sidebar-right {
            grid-template-columns: 1fr var(--sidebar-width);
            grid-template-areas:
                "header header"
                "main sidebar";
        }

        #app-shell.sidebar-right.sidebar-collapsed {
            grid-template-columns: 1fr 0;
        }

        #app-shell.sidebar-right #app-sidebar {
            border-right: none;
            border-left: var(--border-standard);
        }

        /* --- HEADER --- */

        #app-header {
            grid-area: header;
            display: flex;
            align-items: center;
            padding: 0 var(--space-12);
            gap: var(--space-8);
            border-bottom: var(--border-standard);
            background: var(--color-surface);
        }

        #app-name {
            font-family: var(--font-mono);
            font-size: var(--text-lg);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
            flex-shrink: 0;
        }

        .header-spacer {
            flex: 1;
        }

        .vertical-divider {
            width: 1px;
            height: var(--space-12);
            background: var(--color-border);
            margin: 0 var(--space-4);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        /* --- SIDEBAR --- */

        #app-sidebar {
            grid-area: sidebar;
            background: var(--color-surface);
            border-right: var(--border-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .sidebar-section-header {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-6) var(--space-6) 0 var(--space-6);
            cursor: pointer;
        }

        .sidebar-section-empty-msg {
            font-size: var(--text-md);
            font-family: var(--font-mono);
            color: var(--color-text-muted);
            padding: var(--space-2) var(--space-14);
        }

        .sidebar-section-chevron {
            width: var(--icon-sm);
            height: var(--icon-sm);
            fill: none;
            stroke: var(--color-text-muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform var(--transition-base);
            flex-shrink: 0;
        }

        .sidebar-section.collapsed .sidebar-section-chevron {
            transform: rotate(-90deg);
        }

        .sidebar-section.collapsed .sidebar-section-body {
            display: none;
        }

        .sidebar-section-body {
            min-height: 0;
            max-height: 45vh;
            overflow-y: auto;
            padding: var(--space-6) var(--space-4);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        .sidebar-section-list {
            overflow-y: auto;
            padding: var(--space-2);
            flex: 1;
            min-height: 0;
        }

        .sidebar-search-input {
            width: 100%;
            font-family: var(--font-mono);
            font-size: var(--text-md);
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-pill);
            color: var(--color-text-primary);
            padding: var(--space-3);
            outline: none;
            transition: border-color var(--transition-fast);
        }

        .sidebar-search-input:focus {
            border-color: var(--color-border-focus);
        }

        .sidebar-search-input::placeholder {
            color: var(--color-text-muted);
        }

        .sidebar-search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 var(--space-16);
        }

        .sidebar-search-wrapper .sidebar-search-input {
            padding-left: var(--space-5);
            padding-right: var(--space-12);
        }

        .sidebar-search-icon {
            position: absolute;
            right: var(--space-6);
            width: var(--icon-md);
            height: var(--icon-md);
            stroke: var(--color-text-muted);
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            pointer-events: none;
            flex-shrink: 0;
        }

        .sidebar-section-footer {
            padding-top: var(--space-5);
            border-top: var(--space-1) dashed var(--color-border);
            margin-left: var(--space-16);
            margin-right: var(--space-16);
        }

        .sidebar-section-divider {
            height: var(--space-2);
            margin: var(--space-4) var(--space-6);
            background: var(--color-border);
        }

        /* --- CONFIRM MODAL --- */

        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: var(--black-a40);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition-base);
        }

        .modal-backdrop.modal-visible {
            opacity: 1;
            pointer-events: auto;
        }

        .modal {
            background: var(--color-surface);
            border: var(--border-standard);
            border-radius: var(--radius-lg);
            padding: var(--space-6) var(--space-8);
            display: flex;
            flex-direction: column;
            gap: var(--space-4);
            min-width: var(--modal-min-width);
            max-width: var(--modal-max-width);
            box-shadow: 0 var(--space-4) var(--space-12) var(--black-a50);
            transform: translateY(calc(-1 * var(--space-3)));
            transition: transform var(--transition-base);
        }

        .modal-backdrop.modal-visible .modal {
            transform: translateY(0);
        }

        .modal-scrollable-body {
            max-height: 50vh;
            overflow-y: auto;
            margin: 0 calc(var(--space-8) * -1);
            padding: 0 var(--space-8);
        }

        .modal-title {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            font-weight: 600;
            color: var(--color-text-primary);
            padding-bottom: var(--space-7);
        }

        .modal-message {
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            gap: var(--space-4);
            padding-top: var(--space-4);
        }

        /* --- KEYBINDINGS MODAL --- */

        #keybindings-btn svg {
            width: var(--space-10);
            height: var(--space-10);
        }

        .keybindings-table {
            width: 100%;
            border-collapse: collapse;
            font-size: var(--text-md);
        }

        .keybindings-table td {
            padding: var(--space-4) var(--space-2);
            border-bottom: var(--border-standard);
            vertical-align: middle;
        }

        .keybindings-table tr:last-child td {
            border-bottom: none;
        }

        .keybindings-table .key-cell {
            white-space: nowrap;
            padding-right: var(--space-8);
        }

        .kbd {
            display: inline-block;
            font-family: var(--font-mono);
            font-size: var(--text-md);
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            padding: var(--space-1) var(--space-4);
            color: var(--color-text-primary);
        }

        .keybindings-table .desc-cell {
            color: var(--color-text-secondary);
        }

        /* --- RUNBOOK LIBRARY SECTION --- */

        .runbook-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-3);
            position: relative;
        }

        .runbook-item-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            font-family: var(--font-mono);
            font-size: var(--text-md);
            padding: var(--space-3) var(--space-4);
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color var(--transition-base);
        }

        .runbook-item-btn:hover {
            border-color: var(--color-border-focus);
            color: var(--color-text-primary);
        }

        .runbook-item-btn.active {
            background: var(--tag-bg);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .runbook-item-btn.active.drag-over {
            border-color: transparent;
        }

        .runbook-item-btn.runbook-focused {
            outline: var(--space-1) solid var(--accent);
            outline-offset: var(--space-1);
            box-shadow: 0 0 0 var(--space-2) var(--accent-dim);
        }

        .runbook-drag-handle,
        .runbook-row .btn-danger {
            opacity: 0;
            transition: opacity var(--transition-fast), color var(--transition-fast);
        }

        .runbook-row:hover .runbook-drag-handle,
        .runbook-row:hover .btn-danger {
            opacity: 1;
        }

        #runbook-add-btn {
            padding: var(--space-3) var(--space-12);
        }

        #runbook-import-input {
            display: none;
        }

        /* --- VARIABLES SECTION --- */

        #variables-section {
            flex: 1 1 auto;
        }

        .variable-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
        }

        .variable-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-3);
            position: relative;
        }

        .variable-drag-handle,
        .variable-row .btn-danger {
            opacity: 0;
            transition: opacity var(--transition-fast), color var(--transition-fast);
        }

        .variable-row:hover .variable-drag-handle,
        .variable-row:hover .btn-danger {
            opacity: 1;
        }

        #variable-add-btn {
            padding: var(--space-3) var(--space-12);
        }

        .variable-key-input,
        .variable-value-input {
            font-family: var(--font-mono);
            font-size: var(--text-md);
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            padding: var(--space-2) var(--space-4);
            width: 100%;
            outline: none;
            transition: border-color var(--transition-base);
            position: relative;
        }

        .variable-key-input {
            color: var(--accent-text);
            font-weight: 500;
        }

        .variable-key-input:focus,
        .variable-value-input:focus {
            border-color: var(--color-border-focus);
        }

        .variable-key-input::placeholder,
        .variable-value-input::placeholder {
            color: var(--color-text-muted);
        }

        /* Floating tooltip */
        .variable-key-input[title]:hover::after,
        .variable-value-input[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: 0;
            top: calc(100% + var(--space-2));
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            padding: var(--space-2) var(--space-4);
            white-space: pre;
            z-index: 100;
            pointer-events: none;
        }

        /* --- SIDEBAR COLLAPSE --- */

        #sidebar-toggle-btn {
            flex-shrink: 0;
        }

        #sidebar-btn-group {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: var(--space-3);
            align-self: flex-start;
            position: sticky;
            top: var(--space-1);
            z-index: 10;
        }

        #app-shell.sidebar-right #sidebar-btn-group {
            flex-direction: row-reverse;
            align-self: flex-end;
        }

        #app-shell.sidebar-collapsed {
            grid-template-columns: 0 1fr;
        }

        #app-shell.sidebar-collapsed #sidebar-chevron {
            transform: rotate(180deg);
        }

        #app-shell.sidebar-right #sidebar-chevron {
            transform: rotate(180deg);
        }

        #app-shell.sidebar-right.sidebar-collapsed #sidebar-chevron {
            transform: rotate(0deg);
        }

        #app-shell.sidebar-collapsed #app-sidebar {
            width: 0;
            overflow: hidden;
            border-right: none;
        }

        /* --- TABS --- */

        #main-panel {
            grid-area: main;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #tabs-bar {
            display: flex;
            align-items: flex-end;
            background: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            overflow-x: auto;
            flex-shrink: 0;
            padding: var(--space-4) var(--space-3) 0;
            scrollbar-width: none;
            gap: var(--space-1);
        }

        #tabs-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-4) var(--space-3) var(--space-5);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            color: var(--color-text-secondary);
            background: transparent;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            cursor: pointer;
            white-space: nowrap;
            max-width: var(--tab-max-width);
            flex-shrink: 0;
            transition: color var(--transition-fast), background var(--transition-fast), border-color var(--transition-fast);
            bottom: -1px;
        }

        .tab:hover {
            color: var(--color-text-primary);
            background: var(--color-surface-alt);
            border-color: var(--color-border);
        }

        .tab.tab-active {
            color: var(--color-text-primary);
            background: var(--color-bg);
            border-color: var(--color-border);
            border-bottom: 1px solid var(--color-bg);
            z-index: 1;
        }

        .tab.tab-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: var(--space-5);
            right: var(--space-5);
            height: 1px;
            background: var(--success);
            border-radius: var(--radius-pill);
        }

        .tab.dragging {
            opacity: 0.2;
        }

        .tab.drag-over-left::before,
        .tab.drag-over-right::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            border-left: var(--space-1) dashed var(--accent);
        }

        .tab.drag-over-left::before {
            left: -1px;
        }

        .tab.drag-over-right::before {
            right: -1px;
        }

        .tab-close {
            display: inline-flex;
            align-items: flex-start;
            justify-content: center;
            width: var(--space-8);
            height: var(--space-8);
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--color-text-secondary);
            cursor: pointer;
            flex-shrink: 0;
            padding: 0;
            opacity: 0;
            transition: color var(--transition-fast), background var(--transition-fast), opacity var(--transition-fast);
        }

        .tab:hover .tab-close,
        .tab.tab-active .tab-close {
            opacity: 1;
        }

        .tab-close:hover {
            color: var(--color-text-primary);
            background: var(--white-a10);
        }

        .tab-close svg {
            width: var(--icon-sm);
            height: var(--icon-sm);
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            fill: none;
            pointer-events: none;
        }

        #add-tab-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: var(--icon-base);
            height: var(--icon-base);
            background: transparent;
            border: none;
            border-radius: var(--radius-md);
            color: var(--color-text-muted);
            cursor: pointer;
            flex-shrink: 0;
            align-self: center;
            margin-left: var(--space-3);
            margin-bottom: var(--space-2);
            transition: color var(--transition-fast), background var(--transition-fast);
        }

        #add-tab-btn:hover {
            color: var(--color-text-primary);
            background: var(--color-surface-alt);
        }

        #add-tab-btn svg {
            width: var(--icon-md);
            height: var(--icon-md);
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            fill: none;
        }

        #tabs-content {
            flex: 1;
            overflow-y: auto;
            padding-top: var(--space-4);
            padding-right: var(--space-20);
            padding-bottom: var(--space-20);
            padding-left: var(--space-20);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        #blocks-list {
            display: grid;
            grid-template-columns: minmax(var(--block-min-width), max-content);
            max-width: 100%;
            gap: var(--space-3);
        }

        /* Empty state */

        #empty-state {
            margin: auto;
            text-align: center;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        #empty-state svg {
            width: var(--icon-lg);
            height: var(--icon-lg);
            stroke: var(--color-text-muted);
            fill: none;
            stroke-width: 1.75;
        }

        #empty-state-title {
            font-size: var(--text-lg);
        }

        #empty-state-hint {
            font-size: var(--text-base);
            margin-top: var(--space-3)
        }

        /* --- BLOCK ITEMS --- */

        .block-item {
            position: relative;
        }

        .block-item:hover .block-controls,
        .block-item:hover .block-drag-handle {
            opacity: 1;
        }

        .block-controls {
            position: absolute;
            right: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(100%) translateY(-50%);
            display: flex;
            flex-direction: row;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .block-drag-handle {
            position: absolute;
            left: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(-100%) translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .dragging {
            opacity: 0.5;
        }

        .drag-over {
            outline: var(--border-dashed);
            border-radius: var(--radius-sm);
        }

        .block-item.drag-over {
            border-radius: var(--radius-md);
        }

        /* Duplicate flash */

        @keyframes duplicate-flash {
            0% {
                outline: var(--space-1) solid var(--accent);
                outline-offset: var(--space-2);
            }

            100% {
                outline: var(--space-3) solid transparent;
                outline-offset: var(--space-2);
            }
        }

        .block-item.duplicate-flash {
            animation: duplicate-flash 0.5s ease-out forwards;
        }

        /* --- CTRL-HELD SUPPRESSIONS --- */

        body.ctrl-held:not(.read-mode) .block-controls,
        body.ctrl-held:not(.read-mode) .block-drag-handle,
        body.ctrl-held:not(.read-mode) .note-style-row,
        body.ctrl-held:not(.read-mode) .command-preview .btn {
            opacity: 0;
            pointer-events: none;
        }

        body.ctrl-held:not(.read-mode) * {
            user-select: none !important;
        }

        body.ctrl-held:not(.read-mode) .note-textarea,
        body.ctrl-held:not(.read-mode) .command-textarea,
        body.ctrl-held:not(.read-mode) .command-preview-text {
            pointer-events: none;
            cursor: default;
        }

        body.ctrl-held:not(.read-mode) .block-item:hover:not(.block-selected) {
            outline: var(--border-dashed);
            border-radius: var(--radius-lg);
        }

        .block-selected .command-block,
        .block-selected .note-block,
        .block-selected .divider-block {
            user-select: none;
            outline: var(--space-1) solid var(--accent);
        }

        /* --- COMMAND BLOCK --- */

        .command-block {
            background: var(--color-surface);
            border: var(--border-standard);
            border-radius: var(--radius-lg);
            overflow: hidden;
            max-width: 100%;
            min-width: 0;
        }

        .command-block-editor {
            display: flex;
            align-items: stretch;
            border-top: var(--border-standard);
            width: 100%;
            min-width: 0;
        }

        .command-block-editor.collapsed {
            display: none;
        }

        .command-gutter {
            padding: var(--space-5) var(--space-5) var(--space-5) var(--space-6);
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-md);
            line-height: 1.6;
            user-select: none;
            flex-shrink: 0;
            border-right: var(--border-standard);
            display: flex;
            align-items: flex-start;
        }

        .command-gutter-prefix {
            color: var(--success);
            font-weight: 600;
        }

        .command-textarea {
            flex: 1;
            min-width: 0;
            font-family: var(--font-mono);
            font-size: var(--text-base);
            background: transparent;
            border: none;
            color: var(--color-text-primary);
            padding: var(--space-5) var(--space-6);
            resize: none;
            outline: none;
            overflow: hidden;
            line-height: 1.6;
            width: 100%;
        }

        .command-preview {
            padding: var(--space-4) var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-6);
            background: var(--color-bg);
        }

        .command-preview-text {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            color: var(--success);
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: pre;
            min-width: 0;
            padding-bottom: var(--space-2);
        }

        .command-preview-text.has-unresolved {
            color: var(--color-text-secondary);
        }

        .command-preview-placeholder {
            color: var(--color-text-muted);
        }

        .token-resolved {
            color: var(--success);
        }

        .token-unresolved {
            color: var(--danger);
            font-weight: 600;
        }

        .token-literal {
            color: var(--color-text-secondary);
        }

        .toggle-editor-btn {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .toggle-editor-btn:hover {
            color: var(--color-text-secondary);
        }

        .toggle-editor-btn svg {
            width: var(--icon-sm);
            height: var(--icon-sm);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            transition: transform var(--transition-base);
        }

        .toggle-editor-btn.editor-collapsed svg {
            transform: rotate(-90deg);
        }

        /* --- NOTE BLOCK --- */

        .note-block {
            display: inline-grid;
            min-width: var(--block-min-width);
            border-radius: var(--radius-lg);
        }

        .note-auto-width {
            display: inline-grid;
            width: 100%;
        }

        .note-auto-width::after {
            content: attr(data-value) ' ';
            white-space: pre-wrap;
            word-break: break-word;
            visibility: hidden;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
        }

        .note-textarea {
            grid-area: 1 / 1 / 2 / 2;
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: transparent;
            caret-color: var(--color-text-primary);
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.65;
            padding: var(--space-2) 0;
            min-width: var(--block-min-width);
            width: auto;
        }

        .note-textarea::selection,
        .block-item.block-selected .note-textarea::selection {
            background: transparent;
        }

        body:not(.ctrl-held) .note-textarea::selection {
            background-color: var(--selection-color);
        }

        .note-textarea::placeholder {
            color: transparent;
        }

        /* Note styles: heading */

        .note-auto-width.style-heading,
        .note-auto-width.style-heading::after,
        .note-textarea.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: transparent;
            letter-spacing: -0.02em;
        }

        /* Note styles: subheading */

        .note-auto-width.style-subheading,
        .note-auto-width.style-subheading::after,
        .note-textarea.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-xl);
            font-weight: 500;
            color: transparent;
            letter-spacing: 0.03em;
        }

        /* --- Note markdown styles --- */

        .note-bold {
            font-weight: 800;
        }

        .note-italic {
            font-style: italic;
        }

        .note-code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--code-bg);
            color: var(--code-color);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            padding: 0.05em var(--space-3);
            white-space: nowrap;
        }

        /* Note preview */

        .note-preview {
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            line-height: 1.65;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
            word-break: break-word;
            white-space: pre-wrap;
            pointer-events: none;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .note-preview-placeholder {
            color: var(--color-text-muted);
        }

        .note-preview.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .note-preview.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-xl);
            font-weight: 500;
            color: var(--accent-text);
            letter-spacing: 0.03em;
        }

        /* Link activation */

        body.alt-held a.note-link {
            pointer-events: auto;
        }

        /* Note links */

        .note-link {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-dim);
            transition: color var(--transition-base), border-color var(--transition-base);
        }

        .note-link:hover {
            color: var(--accent-text);
            border-bottom-color: var(--accent);
        }

        /* Note style picker */

        .note-style-row {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .note-block:hover .note-style-row,
        .note-block.is-focused .note-style-row {
            opacity: 1;
        }

        .note-block.is-focused .note-preview {
            display: none;
        }

        .note-block.is-focused .note-textarea {
            color: var(--color-text-secondary);
        }

        .note-style-btn {
            padding: var(--space-1) var(--space-4);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            font-size: var(--text-sm);
            font-family: var(--font-mono);
            color: var(--color-text-muted);
            transition: all var(--transition-fast);
        }

        .note-style-btn:hover {
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
        }

        .note-style-btn.active {
            background: var(--tag-bg);
            border-color: var(--color-border-focus);
            color: var(--accent-text);
        }

        /* --- DIVIDER BLOCK --- */

        .divider-block {
            display: flex;
            align-items: center;
            gap: var(--space-6);
            padding: var(--space-4) 0;
            min-width: var(--block-min-width);
            border-radius: var(--radius-md);
        }

        .divider-line {
            flex: 1;
            height: var(--space-2);
            background: var(--color-border);
        }

        /* --- BUTTONS --- */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            border: var(--border-standard);
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
            transition: background var(--transition-base), color var(--transition-base), border-color var(--transition-base);
            outline: none;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--color-surface);
            border-color: var(--color-border-focus);
            color: var(--color-text-primary);
        }

        .btn svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .btn-icon {
            padding: var(--space-2);
            border-radius: var(--radius-sm);
        }

        .btn-flat-icon {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
            padding: var(--space-2);
        }

        .btn-flat-icon:hover {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-primary);
        }

        .btn-primary {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: white;
        }

        .btn-danger {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
        }

        .btn-danger:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn-lg {
            padding: var(--space-4) var(--space-5);
            font-size: var(--text-md);
        }

        .btn-lg svg {
            width: var(--icon-base);
            height: var(--icon-base);
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Drag handle button */

        .drag-handle,
        .variable-drag-handle {
            cursor: grab;
            color: var(--color-text-muted);
            padding: var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .drag-handle:hover,
        .variable-drag-handle:hover {
            color: var(--color-text-primary);
        }

        .drag-handle svg,
        .variable-drag-handle svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: currentColor;
            display: block;
        }

        /* --- ADD BLOCK ROW --- */

        #add-block-row {
            display: flex;
            align-items: center;
            gap: 0;
            padding: var(--space-8) 0 0;
            border-top: var(--space-1) dashed var(--color-border);
            margin-top: var(--space-4);
        }

        .new-block-row-label {
            margin-right: var(--space-6);
        }

        #add-block-row .btn {
            border-radius: 0;
            border-right-width: 0;
        }

        #add-block-row .btn:first-of-type {
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        #add-block-row .btn:last-of-type {
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            border-right-width: 1px;
        }

        #add-block-row .btn:hover {
            z-index: 1;
            position: relative;
            border-color: var(--color-border-focus);
        }

        /* --- READ MODE SUPPRESSIONS --- */

        body.read-mode #runbook-add-btn,
        body.read-mode .runbook-drag-handle,
        body.read-mode .runbook-row .btn-danger {
            display: none !important;
        }

        body.read-mode #add-tab-btn,
        body.read-mode .tab-close {
            visibility: hidden;
        }

        body.read-mode #add-block-row,
        body.read-mode #variable-add-btn,
        body.read-mode .sidebar-section-footer {
            display: none;
        }

        body.read-mode .variable-drag-handle,
        body.read-mode .variable-row .btn-danger {
            display: none !important;
        }

        /* Hide drag and delete button on blocks */
        body.read-mode .block-drag-handle,
        body.read-mode .block-controls {
            display: none !important;
        }

        /* Hide note style picker */
        body.read-mode .note-style-row {
            visibility: hidden;
        }

        /* Force all command editors collapsed and hide the toggle */
        body.read-mode .command-block-editor {
            display: none !important;
        }

        body.read-mode .toggle-editor-btn {
            display: none;
        }

        /* Make all textareas and inputs non-interactive */
        body.read-mode .note-textarea,
        body.read-mode .command-textarea {
            pointer-events: none;
            user-select: none;
            cursor: default;
            visibility: hidden;
        }

        body.read-mode .note-textarea:focus {
            caret-color: transparent;
            outline: none;
        }

        body.read-mode .variable-key-input,
        body.read-mode #collapse-all-btn {
            opacity: 0.5;
            pointer-events: none;
        }

        body.read-mode .runbook-row,
        body.read-mode .variable-row {
            grid-template-columns: 1fr;
        }

        body.read-mode .sidebar-search-wrapper {
            padding: 0 var(--space-2);
        }

        body.read-mode .sidebar-section-empty-msg {
            padding: 0;
        }

        /* Note links become clickable */
        body.read-mode .note-preview a.note-link {
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="app-shell">
        <!-- Header -->
        <header id="app-header">
            <span id="app-name">CommandPad</span>

            <div class="header-spacer"></div>

            <div class="header-actions">
                <button class="btn btn-lg btn-flat-icon" id="mode-toggle-btn" onclick="toggleAppMode()"
                    title="Switch to Read mode">
                    <svg id="mode-icon" viewBox="0 0 16 16">
                        <path d="M5 7V5a3 3 0 0 1 6 0v2M3 7h10v7H3zM8 11v-1" />
                    </svg>
                </button>
                <div class="vertical-divider"></div>
                <button id="collapse-all-btn" class="btn btn-lg" onclick="toggleAllCommandEditors()"
                    title="Expand/collapse all command editors">
                    <svg viewBox="0 0 16 16">
                        <path d="M2 4l6 4-6 4M8 4l6 4-6 4" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Collapse All
                </button>
            </div>

            <div class="header-spacer"></div>

            <div class="header-actions">
                <button id="keybindings-btn" class="btn btn-lg btn-flat-icon" onclick="showKeybindingsModal()"
                    title="App keybindings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <rect x="2" y="6" width="20" height="12" rx="2" />
                        <path d="M6 10h.01M10 10h.01M14 10h.01M18 10h.01" />
                        <path d="M5 14h14" />
                    </svg>
                </button>

                <div class="vertical-divider"></div>

                <button id="export-btn" class="btn btn-lg btn-primary" onclick="showExportModal()"
                    title="Export runbook">
                    <svg viewBox="0 0 16 16">
                        <path d="M8 2v8M5 7l3 3 3-3M3 11v2h10v-2" />
                    </svg>
                    Export
                </button>

                <div class="vertical-divider"></div>

                <button id="clear-btn" class="btn btn-lg btn-danger" onclick="clearAllData()" title="Clear workspace">
                    <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9" />
                    </svg>
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside id="app-sidebar">
            <div id="runbook-section" class="sidebar-section">
                <div class="sidebar-section-header no-user-select" onclick="toggleRunbookSection()">
                    <svg class="sidebar-section-chevron" viewBox="0 0 16 16">
                        <polyline points="4,6 8,10 12,6" />
                    </svg>
                    <p class="section-title">RUNBOOKS</p>
                </div>
                <div class="sidebar-section-body">
                    <div class="sidebar-search-wrapper">
                        <input id="runbook-search-input" class="sidebar-search-input" type="text"
                            placeholder="Search runbooks…" spellcheck="false" autocomplete="off"
                            oninput="runbookSearchQuery = this.value; debouncedRenderRunbookList()" />
                        <svg class="sidebar-search-icon" viewBox="0 0 16 16">
                            <circle cx="6.5" cy="6.5" r="4" />
                            <line x1="10" y1="10" x2="14" y2="14" />
                        </svg>
                    </div>
                    <div id="runbook-list" class="sidebar-section-list"></div>
                    <div class="sidebar-section-footer">
                        <button class="btn" onclick="openRunbookImportDialog()" title="Import runbook">
                            <svg viewBox="0 0 16 16">
                                <path d="M8 11V3M5 6l3-3 3 3M3 11v2h10v-2" />
                            </svg>
                            Import
                        </button>
                    </div>
                </div>
            </div>

            <div class="sidebar-section-divider"></div>

            <div id="variables-section" class="sidebar-section">
                <div class="sidebar-section-header no-user-select" onclick="toggleVariablesSection()">
                    <svg class="sidebar-section-chevron" viewBox="0 0 16 16">
                        <polyline points="4,6 8,10 12,6" />
                    </svg>
                    <p class="section-title">VARIABLES</p>
                </div>
                <div class="sidebar-section-body">
                    <div class="sidebar-search-wrapper">
                        <input id="variable-search-input" class="sidebar-search-input" type="text"
                            placeholder="Search variables…" spellcheck="false" autocomplete="off"
                            oninput="variableSearchQuery = this.value; debouncedRenderVariablesList()" />
                        <svg class="sidebar-search-icon" viewBox="0 0 16 16">
                            <circle cx="6.5" cy="6.5" r="4" />
                            <line x1="10" y1="10" x2="14" y2="14" />
                        </svg>
                    </div>
                    <div id="variables-list" class="sidebar-section-list"></div>
                    <div class="sidebar-section-footer">
                        <button class="btn" onclick="addVariable()" title="New variable">
                            <svg viewBox="0 0 16 16">
                                <path d="M8 3v10M3 8h10" />
                            </svg>
                            New
                        </button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Hidden import input for adding a runbook to the library -->
        <input id="runbook-import-input" type="file" accept=".json" multiple onchange="handleRunbookImport(event)" />

        <!-- Main panel -->
        <main id="main-panel">
            <div id="tabs-bar">
                <!-- Tabs rendered by JS -->
                <button id="add-tab-btn" onclick="createNewTab()" title="New tab">
                    <svg viewBox="0 0 16 16">
                        <path d="M8 3v10M3 8h10" />
                    </svg>
                </button>
            </div>

            <div id="tabs-content">
                <div id="sidebar-btn-group">
                    <button id="sidebar-toggle-btn" class="btn btn-icon" onclick="toggleSidebar()"
                        title="Collapse sidebar">
                        <svg id="sidebar-chevron" viewBox="0 0 16 16">
                            <polyline points="10,4 4,8 10,12" />
                        </svg>
                    </button>
                    <button id="sidebar-position-btn" class="btn btn-icon" onclick="toggleSidebarPosition()"
                        title="Move sidebar to right">
                        <svg viewBox="0 0 16 16">
                            <rect x="1" y="2" width="14" height="12" rx="1" />
                            <line x1="11" y1="2" x2="11" y2="14" />
                        </svg>
                    </button>
                </div>

                <div id="empty-state" class="no-user-select">
                    <svg viewBox="0 0 40 40">
                        <rect x="4" y="6" width="32" height="28" rx="3" />
                        <path d="M10 14l6 6-6 6M18 26h12" />
                    </svg>
                    <p id="empty-state-title">No blocks yet.</p>
                    <p id="empty-state-hint">Add a command or note below.</p>
                </div>

                <div id="blocks-list"></div>

                <div id="add-block-row">
                    <p class="section-title new-block-row-label no-user-select">NEW BLOCK</p>
                    <button class="btn" onclick="addBlock('command')" title="Command block">
                        <svg viewBox="0 0 16 16" width="13" height="13">
                            <polyline points="2,4 5,4" />
                            <polyline points="2,8 8,8" />

        // Timeouts

        const DEFER_MS = 0;
        const DRAG_TIMEOUT_MS = 50;
        const COPY_FEEDBACK_TIMEOUT_MS = 1000;
        const DEBOUNCE_SEARCH_MS = 100;
        const DEBOUNCE_SAVE_MS = 150;
        const DEBOUNCE_PREVIEW_MS = 100;
        const DEBOUNCE_LABEL_SYNC_MS = 100;

        // State

        let tabs = [];
        let activeTabId = null;
        let appInitialized = false;

        function generateId() {
            return Math.random().toString(36).slice(2, 9);
        }

        function debounce(fn, ms) {
            let timer;
            return (...args) => {
                clearTimeout(timer);
                timer = setTimeout(() => fn(...args), ms);
            };
        }

        const debouncedSaveState = debounce(() => saveState(), DEBOUNCE_SAVE_MS);
        const debouncedRefreshAllPreviews = debounce(() => refreshAllPreviews(), DEBOUNCE_PREVIEW_MS);
        const debouncedSyncActiveRunbookLabel = debounce(() => syncActiveRunbookLabel(), DEBOUNCE_LABEL_SYNC_MS);
        const debouncedRenderRunbookList = debounce(() => renderRunbookList(), DEBOUNCE_SEARCH_MS);
        const debouncedRenderVariablesList = debounce(() => renderVariablesList(), DEBOUNCE_SEARCH_MS);

        // Shared handle-based drag-to-reorder
        const dragState = {};

        function makeRowReorderable(row, config) {
            const {
                id,
                handle,
                highlightTarget,
                stateKey,
                getItems,
                onReorder
            } = config;

            handle.addEventListener(EventType.MOUSE_DOWN, () => {
                row.draggable = true;
            });
            handle.addEventListener(EventType.MOUSE_UP, () => {
                setTimeout(() => {
                    row.draggable = false;
                }, DRAG_TIMEOUT_MS);
            });

            row.addEventListener(EventType.DRAG_START, event => {
                dragState[stateKey] = id;
                event.dataTransfer.effectAllowed = DragEffect.MOVE;
                row.classList.add(CssClass.DRAGGING);
            });

            row.addEventListener(EventType.DRAG_END, () => {
                dragState[stateKey] = null;
                row.draggable = false;
                row.classList.remove(CssClass.DRAGGING);
                highlightTarget.classList.remove(CssClass.DRAG_OVER);
            });

            row.addEventListener(EventType.DRAG_OVER, event => {
                if (!dragState[stateKey] || dragState[stateKey] === id) {
                    return;
                }

                event.preventDefault();
                event.dataTransfer.dropEffect = DragEffect.MOVE;
                highlightTarget.classList.add(CssClass.DRAG_OVER);
            });

            row.addEventListener(EventType.DRAG_LEAVE, event => {
                if (!row.contains(event.relatedTarget)) {
                    highlightTarget.classList.remove(CssClass.DRAG_OVER);
                }
            });

            row.addEventListener(EventType.DROP, event => {
                event.preventDefault();
                highlightTarget.classList.remove(CssClass.DRAG_OVER);

                const sourceId = dragState[stateKey];
                if (isReadMode() || !sourceId || sourceId === id) {
                    return;
                }

                const items = getItems();
                const sourceIndex = items.findIndex(item => item.id === sourceId);
                const targetIndex = items.findIndex(item => item.id === id);
                if (sourceIndex < 0 || targetIndex < 0) {
                    return;
                }

                const [removed] = items.splice(sourceIndex, 1);
                items.splice(targetIndex, 0, removed);

                dragState[stateKey] = null;
                onReorder(items);
            });
        }

        function activeTab() {
            return tabs.find(t => t.id === activeTabId) ?? tabs[0] ?? null;
        }

        const state = new Proxy({}, {
            get(_, prop) {
                const tab = activeTab();
                return tab ? tab[prop] : undefined;
            },
            set(_, prop, value) {
                const tab = activeTab();
                if (tab) {
                    tab[prop] = value;
                }

                return true;
            },
        });

        function createTabObject(label = DEFAULT_TAB_LABEL, runbookId = null) {
            return {
                id: generateId(),
                label,
                runbookId,
                variables: [],
                blocks: [],
            };
        }

        async function createNewTab(label, runbookId) {
            if (isReadMode()) {
                return;
            }

            // Switch to an already already open runbook
            if (runbookId) {
                const existingTab = tabs.find(t => t.runbookId === runbookId);
                if (existingTab) {
                    switchTab(existingTab.id);
                    return;
                }
            }

            const resolvedLabel = label ?? DEFAULT_TAB_LABEL;
            const tab = createTabObject(resolvedLabel, runbookId ?? null);
            tabs.push(tab);
            activeTabId = tab.id;

            // Register as a library entry so it appears in the sidebar
            if (!runbookId) {
                const newRunbookId = generateId();
                tab.runbookId = newRunbookId;
                runbookLibrary.push({
                    id: newRunbookId,
                    label: resolvedLabel,
                    filename: ''
                });

                await putRunbookContent(newRunbookId, {
                    variables: [],
                    blocks: []
                });
                activeRunbookId = newRunbookId;
                saveRunbookLibrary();
            }

            saveTabs();
            renderWorkspace();
            return tab;
        }

        function switchTab(tabId) {
            if (activeTabId === tabId) {
                return;
            }

            activeTabId = tabId;
            activeRunbookId = activeTab()?.runbookId ?? null;

            saveTabs();
            renderWorkspace();
            setTimeout(() => {
                autoResizeAllTextarea();
                document.querySelectorAll(Selector.NOTE_TEXTAREA).forEach(t => syncNoteWidth(t));
                refreshAllPreviews();
            }, DEFER_MS);
        }

        function closeTab(tabId) {
            if (isReadMode()) {
                return;
            }

            let idx = tabs.findIndex(t => t.id === tabId);
            if (idx < 0) {
                return;
            }

            tabs.splice(idx, 1);

            if (tabs.length === 0) {
                activeTabId = null;
                activeRunbookId = null;
            } else if (activeTabId === tabId) {
                idx = Math.min(idx, tabs.length - 1);
                activeTabId = tabs[idx].id;
                activeRunbookId = activeTab()?.runbookId ?? null;
            }

            saveTabs();
            renderWorkspace();
            refreshAllPreviews();
        }

        function getRunbookLabel(blocks, fallback) {
            const firstBlock = blocks?.[0];
            if (firstBlock?.type === BlockType.NOTE && firstBlock.text?.trim()) {
                return firstBlock.text.trim().slice(0, 60);
            }

            return fallback || RunbookConfig.DEFAULT_LABEL;
        }

        // Re-render every workspace surface

        function renderWorkspace() {
            renderTabsBar();
            renderRunbookList();
            renderVariablesList();
            renderBlocksList();
            updateEmptyState();
        }

        function renderTabsBar() {
            const bar = document.getElementById(ElementId.TABS_BAR);
            const addBtn = document.getElementById(ElementId.ADD_TAB_BTN);

            bar.querySelectorAll(`.${CssClass.TAB}`).forEach(el => el.remove());

            let dragSrcId = null;

            const clearDropIndicators = () => {
                bar.querySelectorAll(`.${CssClass.TAB}`).forEach(t => {
                    t.classList.remove(CssClass.DRAG_OVER_LEFT, CssClass.DRAG_OVER_RIGHT);
                });
            };

            const createTabElement = (tab) => {
                const tabLabel = tab.label || DEFAULT_TAB_LABEL;
                const tabEl = document.createElement('div');
                const isActive = tab.id === activeTabId;

                tabEl.className = isActive ? `${CssClass.TAB} ${CssClass.TAB_ACTIVE}` : CssClass.TAB;
                tabEl.dataset.tabId = tab.id;
                tabEl.title = tabLabel;
                tabEl.draggable = true;

                const labelSpan = document.createElement('span');
                labelSpan.style.cssText =
                    'overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;';
                labelSpan.textContent = tabLabel;

                const closeBtn = document.createElement('button');
                closeBtn.className = CssClass.TAB_CLOSE;
                closeBtn.title = 'Close tab';
                closeBtn.innerHTML = '<svg viewBox="0 0 16 16"><path d="M4 4l8 8M12 4l-8 8"/></svg>';
                closeBtn.addEventListener(EventType.CLICK, e => {
                    e.stopPropagation();
                    closeTab(tab.id);
                });

                tabEl.appendChild(labelSpan);
                tabEl.appendChild(closeBtn);
                tabEl.addEventListener(EventType.CLICK, () => switchTab(tab.id));
                tabEl.addEventListener(EventType.MOUSE_DOWN, e => {
                    if (e.button === 1) {
                        e.preventDefault();
                    }
                });
                tabEl.addEventListener(EventType.MOUSE_UP, e => {
                    if (e.button === 1) {
                        e.preventDefault();
                        closeTab(tab.id);
                    }
                });

                setupTabDragHandlers(tabEl, tab, clearDropIndicators);

                return tabEl;
            };

            const setupTabDragHandlers = (tabEl, tab, clearIndicators) => {
                tabEl.addEventListener(EventType.DRAG_START, e => {
                    dragSrcId = tab.id;
                    tabEl.classList.add(CssClass.DRAGGING);
                    e.dataTransfer.effectAllowed = DragEffect.MOVE;
                });

                tabEl.addEventListener(EventType.DRAG_END, () => {
                    dragSrcId = null;
                    tabEl.classList.remove(CssClass.DRAGGING);
                    clearIndicators();
                });

                tabEl.addEventListener(EventType.DRAG_OVER, e => {
                    if (!dragSrcId || dragSrcId === tab.id) {
                        return;
                    }

                    e.preventDefault();
                    e.dataTransfer.dropEffect = DragEffect.MOVE;

                    const rect = tabEl.getBoundingClientRect();
                    const isLeftHalf = e.clientX < rect.left + rect.width / 2;

                    clearIndicators();
                    tabEl.classList.add(isLeftHalf ? CssClass.DRAG_OVER_LEFT : CssClass.DRAG_OVER_RIGHT);
                });

                tabEl.addEventListener(EventType.DRAG_LEAVE, e => {
                    if (!tabEl.contains(e.relatedTarget)) {
                        tabEl.classList.remove(CssClass.DRAG_OVER_LEFT, CssClass.DRAG_OVER_RIGHT);
                    }
                });

                tabEl.addEventListener(EventType.DROP, e => {
                    e.preventDefault();
                    if (!dragSrcId || dragSrcId === tab.id) {
                        return;
                    }

                    const rect = tabEl.getBoundingClientRect();
                    const isLeftHalf = e.clientX < rect.left + rect.width / 2;

                    const srcIdx = tabs.findIndex(t => t.id === dragSrcId);
                    if (srcIdx === -1) {
                        return;
                    }

                    const [dragged] = tabs.splice(srcIdx, 1);
                    let dstIdx = tabs.findIndex(t => t.id === tab.id);
                    if (!isLeftHalf) {
                        dstIdx++;
                    }

                    tabs.splice(dstIdx, 0, dragged);
                    saveTabs();
                    renderTabsBar();
                });
            };

            tabs.forEach(tab => {
                bar.insertBefore(createTabElement(tab), addBtn);
            });
        }

        // Tab persistence

        function saveTabs() {
            try {
                localStorage.setItem(TABS_STORAGE_KEY, JSON.stringify({
                    tabOrder: tabs.map(t => ({
                        tabId: t.id,
                        runbookId: t.runbookId
                    })),
                    activeTabId,
                }));
            } catch {}
        }

        async function loadTabs() {
            try {
                const saved = JSON.parse(localStorage.getItem(TABS_STORAGE_KEY));
                if (!saved?.tabOrder?.length) {
                    return;
                }

                const loadedTabs = [];
                for (const {
                        tabId,
                        runbookId
                    }
                    of saved.tabOrder) {
                    const entry = runbookLibrary.find(r => r.id === runbookId);

                    // runbook was deleted
                    if (!entry) {
                        continue;
                    }

                    const content = await getRunbookContent(runbookId);
                    if (!content) {
                        continue;
                    }

                    loadedTabs.push({
                        id: tabId,
                        label: entry.label,
                        runbookId,
                        variables: content.variables ?? [],
                        blocks: content.blocks ?? [],
                    });
                }

                if (loadedTabs.length === 0) {
                    return;
                }

                tabs = loadedTabs;

                const activeId = saved.activeTabId;
                activeTabId = activeId && tabs.find(t => t.id === activeId) ?
                    activeId :
                    tabs[0].id;

                activeRunbookId = activeTab()?.runbookId ?? null;
            } catch {}
        }

        //  Runbook Library

        let runbookDbInstance = null;

        function openRunbookDb() {
            return new Promise((resolve, reject) => {
                if (runbookDbInstance) {
                    resolve(runbookDbInstance);
                    return;
                }

                const request = indexedDB.open(RunbookConfig.DB_NAME, RunbookConfig.DB_VERSION);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (db.objectStoreNames.contains(RunbookConfig.STORE_NAME)) {
                        return;
                    }

                    db.createObjectStore(RunbookConfig.STORE_NAME, {
                        keyPath: 'id'
                    });
                };

                request.onsuccess = () => {
                    runbookDbInstance = request.result;
                    resolve(runbookDbInstance);
                };

                request.onerror = () => reject(request.error);
            });
        }

        async function putRunbookContent(id, content) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_WRITE);
                tx.objectStore(RunbookConfig.STORE_NAME).put({
                    id,
                    content
                });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getRunbookContent(id) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_ONLY);
                const request = tx.objectStore(RunbookConfig.STORE_NAME).get(id);
                request.onsuccess = () => resolve(request.result ? request.result.content : null);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteRunbookContent(id) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_WRITE);
                tx.objectStore(RunbookConfig.STORE_NAME).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        //  Runbook library metadata

        let runbookLibrary = [];
        let activeRunbookId = null;
        let focusedRunbookId = null;

        function saveRunbookLibrary() {
            try {
                localStorage.setItem(RunbookConfig.LIBRARY_STORAGE_KEY, JSON.stringify({
                    items: runbookLibrary,
                    activeId: activeRunbookId,
                }));
            } catch {}
        }

        function loadRunbookLibrary() {
            try {
                const saved = JSON.parse(localStorage.getItem(RunbookConfig.LIBRARY_STORAGE_KEY));
                if (!saved) {
                    return;
                }

                runbookLibrary = saved.items ?? [];
                activeRunbookId = saved.activeId ?? null;
            } catch {}
        }

        async function addRunbookToLibrary(content, filename) {
            const label = getRunbookLabel(content.blocks, filename || RunbookConfig.DEFAULT_LABEL);

            const existingEntry = runbookLibrary.find(item => item.label === label || item.filename === filename);
            if (existingEntry) {
                existingEntry.label = label;
                existingEntry.filename = filename || '';

                const existingEntryId = existingEntry.id;
                await putRunbookContent(existingEntryId, content);
                saveRunbookLibrary();

                // Apply the new content directly to the in-memory tab
                const openTab = tabs.find(t => t.runbookId === existingEntryId);
                if (openTab) {
                    openTab.variables = content.variables ?? [];
                    openTab.blocks = content.blocks ?? [];

                    if (existingEntryId === activeRunbookId) {
                        saveTabs();
                        renderVariablesList();
                        renderBlocksList();
                        updateEmptyState();
                        setTimeout(() => {
                            autoResizeAllTextarea();
                            document.querySelectorAll(Selector.NOTE_TEXTAREA).forEach(t => syncNoteWidth(
                                t));
                            refreshAllPreviews();
                        }, DEFER_MS);
                    }
                }

                renderRunbookList();
                return;
            }

            const id = generateId();
            runbookLibrary.push({
                id,
                label,
                filename: filename || ''
            });

            await putRunbookContent(id, content);

            if (activeRunbookId) {
                saveRunbookLibrary();
                renderRunbookList();
                return;
            }

            await loadRunbookFromLibrary(id);
        }

        async function loadRunbookFromLibrary(runbookId) {
            const content = await getRunbookContent(runbookId);
            if (!content) {
                return;
            }

            const runbook = runbookLibrary.find(r => r.id === runbookId);
            const label = runbook?.label ?? DEFAULT_TAB_LABEL;

            // Check if a tab for this runbook is already open
            const existingTab = tabs.find(t => t.runbookId === runbookId);
            if (existingTab) {
                switchTab(existingTab.id);
                renderRunbookList();
                return;
            }

            // Open in a new tab
            const tab = createTabObject(label, runbookId);
            tab.variables = content.variables ?? [];
            tab.blocks = content.blocks ?? [];
            tabs.push(tab);

            activeTabId = tab.id;
            activeRunbookId = runbookId;

            saveTabs();
            saveRunbookLibrary();
            renderWorkspace();

            setTimeout(() => {
                autoResizeAllTextarea();
                document.querySelectorAll(Selector.NOTE_TEXTAREA).forEach(t => syncNoteWidth(t));
                refreshAllPreviews();
            }, DEFER_MS);
        }

        async function overwriteActiveRunbookInLibrary() {
            if (!activeRunbookId) {
                return;
            }

            const entry = runbookLibrary.find(item => item.id === activeRunbookId);
            if (!entry) {
                return;
            }

            entry.label = getRunbookLabel(state.blocks, entry.label);
            const content = {
                variables: state.variables,
                blocks: state.blocks
            };

            await putRunbookContent(activeRunbookId, content);
            saveRunbookLibrary();
            renderRunbookList();
        }

        async function removeRunbookFromLibrary(id) {
            if (isReadMode()) {
                return;
            }

            runbookLibrary = runbookLibrary.filter(item => item.id !== id);
            await deleteRunbookContent(id);

            // Close any tab associated with this runbook
            let tabIdx = tabs.findIndex(t => t.runbookId === id);
            if (tabIdx >= 0) {
                tabs.splice(tabIdx, 1);

                if (tabs.length === 0) {
                    activeTabId = null;
                    activeRunbookId = null;
                } else if (activeTabId === tabs[tabIdx]?.id || !tabs.find(t => t.id === activeTabId)) {
                    tabIdx = Math.min(tabIdx, tabs.length - 1);
                    activeTabId = tabs[tabIdx].id;
                    activeRunbookId = activeTab()?.runbookId ?? null;
                }
            }

            if (activeRunbookId === id) {
                activeRunbookId = null;
            }

            saveTabs();
            saveRunbookLibrary();
            renderWorkspace();
        }

        function setRunbookFocus(id) {
            focusedRunbookId = id;
            updateRunbookFocusVisuals();
        }

        function clearRunbookFocus() {
            focusedRunbookId = null;
            updateRunbookFocusVisuals();

        function updateRunbookFocusVisuals() {
            document.querySelectorAll(Selector.RUNBOOK_ITEM_BTN).forEach(btn => {
                const row = btn.closest(Selector.RUNBOOK_ROW);
                btn.classList.toggle(CssClass.RUNBOOK_FOCUSED, row?.dataset.runbookId === focusedRunbookId);
            });

        function navigateRunbookList(direction) {
            const runbookCount = runbookLibrary.length;
            if (runbookCount === 0) {
                return;
            }

            const currentIndex = runbookLibrary.findIndex(item => item.id === focusedRunbookId);

            let nextIndex;
            if (currentIndex < 0) {
                nextIndex = direction === Key.ARROW_DOWN ? 0 : runbookCount - 1;
            } else {
                nextIndex = direction === Key.ARROW_DOWN ?
                    (currentIndex + 1) % runbookCount :
                    (currentIndex - 1 + runbookCount) % runbookCount;
            }

            const nextId = runbookLibrary[nextIndex].id;
            focusedRunbookId = nextId;

            loadRunbookFromLibrary(nextId).then(() => {
                updateRunbookFocusVisuals();
                scrollRunbookItemIntoView(nextId);
            });
        }

        function scrollRunbookItemIntoView(runbookId) {
            const list = document.getElementById(ElementId.RUNBOOK_LIST);
            const row = list?.querySelector(`[data-runbook-id="${runbookId}"]`);
            row?.scrollIntoView({
                block: 'center',
                behavior: 'smooth'
            });
        }

        function openRunbookImportDialog() {
            document.getElementById(ElementId.RUNBOOK_IMPORT_INPUT).click();
        }

        function handleRunbookImport(event) {
            const files = Array.from(event.target.files || []);
            if (files.length === 0) {
                return;
            }

            let failedCount = 0;

            const readFile = file => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = async loadEvent => {
                    try {
                        const importedContent = JSON.parse(loadEvent.target.result);
                        if (!importedContent.variables || !importedContent.blocks) {
                            throw new Error('Invalid format');
                        }
                        await addRunbookToLibrary(importedContent, file.name.replace(/\.json$/i, ''));
                    } catch {
                        failedCount += 1;
                    }
                    resolve();
                };
                reader.onerror = () => {
                    failedCount += 1;
                    resolve();
                };
                reader.readAsText(file);
            });

            Promise.all(files.map(readFile)).then(() => {
                if (failedCount > 0) {
                    alert(`${failedCount} file(s) could not be imported (invalid format).`);
                }
            });

            event.target.value = '';
        }

        // Sidebar search state

        let runbookSearchQuery = '';
        let variableSearchQuery = '';

        function matchesQuery(query, ...fields) {
            if (!query) {
                return true;
            }

            const needle = query.toLowerCase();
            return fields.some(field => field?.toLowerCase().includes(needle));
        }

            const container = document.getElementById(ElementId.RUNBOOK_LIST);
            container.innerHTML = '';

            if (runbookLibrary.length === 0) {

                emptyMsg.className = CssClass.SIDEBAR_SECTION_EMPTY_MSG;
                emptyMsg.textContent = 'No runbooks imported.';
                container.appendChild(emptyMsg);
                return;
            }

            const visibleRunbooks = runbookLibrary.filter(runbook =>
                matchesQuery(runbookSearchQuery, runbook.label, runbook.filename)

            if (visibleRunbooks.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = CssClass.SIDEBAR_SECTION_EMPTY_MSG;
                emptyMsg.textContent = 'No matches.';
                container.appendChild(emptyMsg);
                return;
