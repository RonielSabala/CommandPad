<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommandPad</title>
    <style>
        :root {
            /* Core config */
            --base-unit: 17px;
            --font-mono: 'Cascadia Code', monospace;
            --font-sans: 'Inter', sans-serif;

            /* Accents & semantic colors */
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --accent-text: #93c5fd;
            --success: #34d399;
            --danger: #f87171;
            --danger-dim: rgba(248, 113, 113, 0.12);
            --tag-bg: rgba(59, 130, 246, 0.1);
            --tag-text: #7cb9fd;

            /* Surfaces */
            --color-bg: #0a0a0c;
            --color-surface: #111114;
            --color-surface-alt: #18181d;
            --color-border: #232329;
            --color-border-focus: #3b82f6;

            /* Text */
            --color-text-primary: #f1f2f4;
            --color-text-secondary: #8b8d98;
            --color-text-muted: #3f4150;

            /* Space scale */
            --space-1: calc(var(--base-unit) * 0.125);
            --space-2: calc(var(--base-unit) * 0.25);
            --space-3: calc(var(--base-unit) * 0.375);
            --space-4: calc(var(--base-unit) * 0.5);
            --space-5: calc(var(--base-unit) * 0.625);
            --space-6: calc(var(--base-unit) * 0.75);
            --space-7: calc(var(--base-unit) * 1);
            --space-8: calc(var(--base-unit) * 1.5);
            --space-9: calc(var(--base-unit) * 2);
            --space-10: calc(var(--base-unit) * 3);

            /* Type scale */
            --text-xs: calc(var(--base-unit) * 0.6875);
            --text-sm: calc(var(--base-unit) * 0.8125);
            --text-md: calc(var(--base-unit) * 0.875);
            --text-base: calc(var(--base-unit) * 0.9375);
            --text-lg: calc(var(--base-unit) * 1.25);
            --text-logo: calc(var(--base-unit) * 1.5625);

            /* Radius scale */
            --radius-sm: calc(var(--base-unit) * 0.25);
            --radius-md: calc(var(--base-unit) * 0.375);
            --radius-lg: calc(var(--base-unit) * 0.625);

            /* Icon scale */
            --icon-sm: calc(var(--base-unit) * 0.75);
            --icon-md: calc(var(--base-unit) * 0.875);
            --icon-base: calc(var(--base-unit) * 1);
            --icon-lg: calc(var(--base-unit) * 2.5);

            /* Layout dimensions */
            --sidebar-width: calc(var(--base-unit) * 18.75);
            --header-height: calc(var(--base-unit) * 3.5);
            --scrollbar-size: calc(var(--base-unit) * 0.625);
            --note-min-width: calc(var(--base-unit) * 7.5);

            /* Compound tokens */
            --border-standard: 1px solid var(--color-border);
            --transition-fast: 0.1s;
            --transition-base: 0.15s;
        }

        /* --- BASE --- */

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            font-size: var(--text-base);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* --- SCROLLBAR --- */

        ::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-md);
        }

        /* --- LAYOUT --- */

        .app-shell {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
            grid-template-areas:
                "header header"
                "sidebar main";
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */

        .app-header {
            grid-area: header;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 var(--space-8);
            border-bottom: var(--border-standard);
            background: var(--color-surface);
        }

        .logo-name {
            font-family: var(--font-mono);
            font-size: var(--text-logo);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
        }

        .header-actions {
            display: flex;
            gap: var(--space-4);
        }

        /* --- SIDEBAR --- */

        .app-sidebar {
            grid-area: sidebar;
            background: var(--color-surface);
            border-right: var(--border-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .sidebar-title {
            padding: var(--space-6);
        }

        .variables-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 var(--space-6) var(--space-6);
        }

        .variable-row {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-3);
        }

        .variable-add-row {
            padding: var(--space-2) 0 var(--space-1);
        }

        .variable-key-input,
        .variable-value-input {
            font-family: var(--font-mono);
            font-size: var(--text-md);
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            padding: var(--space-2) var(--space-4);
            width: 100%;
            outline: none;
            transition: border-color var(--transition-base);
        }

        .variable-key-input:focus,
        .variable-value-input:focus {
            border-color: var(--color-border-focus);
        }

        .variable-key-input {
            color: var(--accent-text);
            font-weight: 500;
        }

        .variable-key-input::placeholder,
        .variable-value-input::placeholder {
            color: var(--color-text-muted);
        }

        /* --- MAIN PANELS --- */

        .app-main {
            grid-area: main;
            overflow-y: auto;
            padding: var(--space-4) var(--space-9) var(--space-10);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        #blocks-list {
            display: grid;
            grid-template-columns: max-content;
            gap: var(--space-3);
        }

        .main-empty-state {
            margin: auto;
            text-align: center;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-lg);
        }

        .main-empty-state svg {
            width: var(--icon-lg);
            height: var(--icon-lg);
            stroke: var(--color-text-muted);
            fill: none;
            stroke-width: 1.5;
            margin-bottom: var(--space-3);
        }

        /* --- BLOCK ITEMS --- */

        .block-item {
            position: relative;
        }

        .block-item:hover .block-controls,
        .block-item:hover .block-drag-handle {
            opacity: 1;
        }

        .block-controls {
            position: absolute;
            right: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(100%) translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .block-drag-handle {
            position: absolute;
            left: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(-100%) translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .block-item.dragging {
            opacity: 0.5;
        }

        .block-item.drag-over {
            outline: 1px dashed var(--accent);
            border-radius: var(--radius-md);
        }

        /* --- COMMAND BLOCK --- */

        .command-block {
            background: var(--color-surface);
            border: var(--border-standard);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .command-block-editor {
            display: flex;
            align-items: flex-start;
            border-top: var(--border-standard);
        }

        .command-block-editor.collapsed {
            display: none;
        }

        .command-gutter {
            padding: var(--space-5) var(--space-5) var(--space-5) var(--space-6);
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-md);
            line-height: 1.6;
            user-select: none;
            flex-shrink: 0;
            border-right: var(--border-standard);
        }

        .command-gutter-prefix {
            color: var(--success);
            font-weight: 600;
        }

        .command-textarea {
            flex: 1;
            font-family: var(--font-mono);
            font-size: var(--text-base);
            background: transparent;
            border: none;
            color: var(--color-text-primary);
            padding: var(--space-5) var(--space-6);
            resize: none;
            outline: none;
            overflow: hidden;
            line-height: 1.6;
            min-height: calc(var(--base-unit) * 2.5);
            width: 100%;
        }

        .command-preview {
            padding: var(--space-4) var(--space-6);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-6);
            background: var(--color-bg);
        }

        .command-preview-text {
            font-family: var(--font-mono);
            font-size: var(--text-md);
            color: var(--success);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .command-preview-text.has-unresolved {
            color: var(--color-text-secondary);
        }

        .token-resolved {
            color: var(--success);
        }

        .token-unresolved {
            color: var(--danger);
            font-weight: 600;
        }

        .toggle-editor-btn {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: transparent;
            border: none;
            cursor: pointer;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .toggle-editor-btn:hover {
            color: var(--color-text-secondary);
        }

        .toggle-editor-btn svg {
            width: var(--icon-sm);
            height: var(--icon-sm);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            transition: transform var(--transition-base);
        }

        .toggle-editor-btn.editor-collapsed svg {
            transform: rotate(-90deg);
        }

        /* --- NOTE BLOCK --- */

        .note-block {
            display: inline-grid;
            min-width: var(--note-min-width);
        }

        .note-auto-width {
            display: inline-grid;
            width: 100%;
        }

        .note-auto-width::after {
            content: attr(data-value) ' ';
            white-space: pre-wrap;
            word-break: break-word;
            visibility: hidden;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
        }

        .note-textarea {
            grid-area: 1 / 1 / 2 / 2;
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: transparent;
            caret-color: var(--color-text-secondary);
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.65;
            padding: var(--space-2) 0;
            border-bottom: 1px dashed transparent;
            transition: border-color var(--transition-base);
            min-width: var(--note-min-width);
            width: auto;
        }

        .note-textarea::selection {
            color: transparent;
            background: var(--accent-dim);
        }

        .note-textarea:focus {
            border-bottom-color: var(--color-border);
            caret-color: var(--color-text-primary);
        }

        .note-textarea::placeholder {
            color: transparent;
        }

        /* Note styles: heading */

        .note-auto-width.style-heading,
        .note-auto-width.style-heading::after,
        .note-textarea.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: transparent;
            letter-spacing: -0.02em;
        }

        .note-textarea.style-heading:focus {
            caret-color: var(--color-text-primary);
        }

        /* Note styles: subheading */

        .note-auto-width.style-subheading,
        .note-auto-width.style-subheading::after,
        .note-textarea.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-md);
            font-weight: 500;
            color: transparent;
            letter-spacing: 0.03em;
        }

        .note-textarea.style-subheading:focus {
            caret-color: var(--accent-text);
        }

        /* Note preview */

        .note-preview {
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            line-height: 1.65;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
            word-break: break-word;
            white-space: pre-wrap;
            pointer-events: none;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .note-preview.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .note-preview.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-md);
            font-weight: 500;
            color: var(--accent-text);
            letter-spacing: 0.03em;
        }

        /* Ctrl+click link activation */

        body.ctrl-held .note-preview a.note-link {
            pointer-events: auto;
        }

        /* Note links */

        .note-link {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-dim);
            transition: color var(--transition-base), border-color var(--transition-base);
        }

        .note-link:hover {
            color: var(--accent-text);
            border-bottom-color: var(--accent);
        }

        /* Note style picker */

        .note-style-row {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
            height: calc(var(--base-unit) * 1.375);
        }

        .note-block:hover .note-style-row,
        .note-block.is-focused .note-style-row {
            opacity: 1;
        }

        .note-style-btn {
            padding: var(--space-1) var(--space-4);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            font-size: var(--text-sm);
            font-family: var(--font-mono);
            color: var(--color-text-muted);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .note-style-btn:hover {
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
        }

        .note-style-btn.active {
            background: var(--tag-bg);
            border-color: var(--color-border-focus);
            color: var(--accent-text);
        }

        /* --- DIVIDER BLOCK --- */

        .divider-block {
            display: flex;
            align-items: center;
            gap: var(--space-6);
            padding: var(--space-4) 0;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background: var(--color-border);
        }

        /* --- BUTTONS --- */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            border: var(--border-standard);
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
            transition: background var(--transition-base), color var(--transition-base), border-color var(--transition-base);
            outline: none;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--color-surface);
            border-color: var(--color-border-focus);
            color: var(--color-text-primary);
        }

        .btn svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .btn-icon {
            padding: var(--space-2);
            border-radius: var(--radius-sm);
        }

        .btn-primary {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn-danger-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
        }

        .btn-danger-ghost:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn-lg {
            padding: var(--space-4) var(--space-5);
            font-size: var(--text-md);
        }

        .btn-lg svg {
            width: var(--icon-base);
            height: var(--icon-base);
        }

        /* Drag handle button */

        .drag-handle {
            cursor: grab;
            color: var(--color-text-muted);
            padding: var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .drag-handle:hover {
            color: var(--color-text-secondary);
        }

        .drag-handle svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: currentColor;
            display: block;
        }

        /* --- ADD BLOCK ROW --- */

        .add-block-row {
            display: flex;
            align-items: center;
            gap: 0;
            padding: var(--space-7) 0 0;
            border-top: var(--border-standard);
            margin-top: var(--space-4);
        }

        .new-block-row-label {
            margin-right: var(--space-6);
        }

        .add-block-row .btn {
            border-radius: 0;
            border-right-width: 0;
        }

        .add-block-row .btn:first-of-type {
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        .add-block-row .btn:last-of-type {
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            border-right-width: 1px;
        }

        .add-block-row .btn:hover {
            z-index: 1;
            position: relative;
            border-color: var(--color-border-focus);
        }

        /* --- MODE TOGGLE BUTTON --- */

        .btn-mode-toggle {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
            padding: var(--space-2);
        }

        .btn-mode-toggle:hover {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-primary);
        }

        /* --- READ MODE SUPPRESSIONS --- */

        /* Hide block and variable add/delete */
        body.read-mode .add-block-row,
        body.read-mode .variable-add-row,
        body.read-mode .variable-row .btn-danger-ghost {
            display: none;
        }

        /* Hide drag and delete button on blocks */
        body.read-mode .block-drag-handle,
        body.read-mode .block-controls {
            display: none !important;
        }

        /* Hide note style picker */
        body.read-mode .note-style-row {
            visibility: hidden;
        }

        /* Force all command editors collapsed and hide the toggle */
        body.read-mode .command-block-editor {
            display: none !important;
        }

        body.read-mode .toggle-editor-btn {
            display: none;
        }

        /* Make all textareas and inputs non-interactive */
        body.read-mode .note-textarea,
        body.read-mode .command-textarea {
            pointer-events: none;
            user-select: none;
            cursor: default;
        }

        body.read-mode .note-textarea:focus {
            border-bottom-color: transparent;
            caret-color: transparent;
            outline: none;
        }

        body.read-mode .variable-key-input {
            pointer-events: none;
            opacity: 0.5;
        }

        /* Read mode: note links become always clickable */
        body.read-mode .note-preview a.note-link {
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <header class="app-header">
            <span class="logo-name">CommandPad</span>
            <div class="header-actions">
                <button class="btn btn-lg btn-mode-toggle" id="mode-toggle-btn" onclick="toggleAppMode()"
                    title="Switch to Read mode">
                    <svg id="mode-icon" viewBox="0 0 16 16">
                        <path d="M1 8s3-5 7-5 7 5 7 5-3 5-7 5-7-5-7-5z M8 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z" />
                    </svg>
                </button>
                <button class="btn btn-lg" onclick="toggleAllCommandEditors()"
                    title="Expand/collapse all command editors">
                    <svg viewBox="0 0 16 16">
                        <path d="M2 4l6 4-6 4M8 4l6 4-6 4" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                    Toggle All
                </button>
                <button class="btn btn-lg btn-danger-ghost" onclick="clearAllData()"
                    title="Clear all variables and blocks">
                    <svg viewBox="0 0 16 16">
                        <path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9" fill="none" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" stroke-linejoin="round" />
                    </svg>
                </button>
                <button class="btn btn-lg" onclick="exportToFile()">
                    <svg viewBox="0 0 16 16">
                        <path d="M8 2v8M5 7l3 3 3-3M3 11v2h10v-2" />
                    </svg>
                    Export
                </button>
                <button class="btn btn-lg btn-primary" onclick="openImportDialog()">
                    <svg viewBox="0 0 16 16">
                        <path d="M8 11V3M5 6l3-3 3 3M3 11v2h10v-2" />
                    </svg>
                    Import
                </button>
            </div>
        </header>

        <!-- Sidebar -->
        <aside class="app-sidebar">
            <p class="section-title sidebar-title">VARIABLES</p>
            <div class="variables-list" id="variables-list"></div>
        </aside>

        <!-- Main panel -->
        <main class="app-main" id="main-panel">
            <div class="main-empty-state" id="empty-state">
                <svg viewBox="0 0 40 40">
                    <rect x="4" y="6" width="32" height="28" rx="3" />
                    <path d="M10 14l6 6-6 6M18 26h12" />
                </svg>
                <p>No blocks yet.</p>
                <p style="margin-top:var(--space-3); font-size:var(--text-md);">Add a command or note below.</p>
            </div>

            <div id="blocks-list"></div>

            <div class="add-block-row" id="add-block-row">
                <p class="section-title new-block-row-label">NEW BLOCK</p>
                <button class="btn" onclick="addBlock('command')">
                    <svg viewBox="0 0 16 16" width="13" height="13">
                        <polyline points="2,4 5,4" />
                        <polyline points="2,8 8,8" />
                        <polyline points="8,4 14,8 8,12" />
                    </svg>
                    Command
                </button>
                <button class="btn" onclick="addBlock('note')">
                    <svg viewBox="0 0 16 16" width="13" height="13">
                        <path d="M3 3h10v8l-3 3H3z" />
                        <path d="M10 11v3" />
                    </svg>
                    Note
                </button>
                <button class="btn" onclick="addBlock('divider')">
                    <svg viewBox="0 0 16 16">
                        <path d="M1 8 C3 5, 5 11, 7 8 S11 5, 13 8 S15 5, 15 8" />
                    </svg>
                    Divider
                </button>
            </div>
        </main>
    </div>

    <!-- Hidden import input -->
    <input type="file" id="import-file-input" accept=".json" style="display:none" onchange="handleImport(event)" />

    <script>
        //  State
        const STORAGE_KEY = 'commandpad_v1';
        const MODE_STORAGE_KEY = 'commandpad_mode_v1';

        // Enums

        const AppMode = Object.freeze({
            EDIT: 'edit',
            READ: 'read',
        });

        const BlockType = Object.freeze({
            COMMAND: 'command',
            NOTE: 'note',
            DIVIDER: 'divider',
        });

        const NoteStyle = Object.freeze({
            HEADING: 'heading',
            SUBHEADING: 'subheading',
            BODY: 'body',
        });

        const SegmentType = Object.freeze({
            LITERAL: 'literal',
            RESOLVED: 'resolved',
            UNRESOLVED: 'unresolved',
        });

        const MoveDirection = Object.freeze({
            UP: 'up',
            DOWN: 'down',
        });

        const VariableField = Object.freeze({
            KEY: 'key',
            VALUE: 'value',
        });

        const CssClass = Object.freeze({
            DRAGGING: 'dragging',
            DRAG_OVER: 'drag-over',
            COLLAPSED: 'collapsed',
            EDITOR_COLLAPSED: 'editor-collapsed',
            ACTIVE: 'active',
            IS_FOCUSED: 'is-focused',
            HAS_UNRESOLVED: 'has-unresolved',
            CTRL_HELD: 'ctrl-held',
            READ_MODE: 'read-mode',
        });

        const EventType = Object.freeze({
            DROP: 'drop',
            KEY_UP: 'keyup',
            KEY_DOWN: 'keydown',
            CLICK: 'click',
            MOUSE_UP: 'mouseup',
            MOUSE_DOWN: 'mousedown',
            MOUSE_MOVE: 'mousemove',
            DRAG_END: 'dragend',
            DRAG_OVER: 'dragover',
            DRAG_START: 'dragstart',
        });

        const Key = Object.freeze({
            CONTROL: 'Control',
            META: 'Meta',
        });

        const Cursor = Object.freeze({
            POINTER: 'pointer',
            DEFAULT: '',
        });

        const Selector = Object.freeze({
            NOTE_LINK: 'a.note-link',
        });

        const Anchor = Object.freeze({
            TARGET_BLANK: '_blank',
            REL: 'noopener,noreferrer',
        });

        const ElementId = Object.freeze({
            VARIABLES_LIST: 'variables-list',
            BLOCKS_LIST: 'blocks-list',
            EMPTY_STATE: 'empty-state',
            IMPORT_FILE_INPUT: 'import-file-input',
        });

        const ExportConfig = Object.freeze({
            FILENAME: 'commandpad-export.json',
            MIME_TYPE: 'application/json',
        });

        const DragEffect = Object.freeze({
            MOVE: 'move',
        });

        const LinkifyConfig = Object.freeze({
            URL_REGEX: /(https?:\/\/[^\s<>"{}|\\^`\[\]]*[^\s<>"{}|\\^`\[\].,;:!?()\-])/g,
        });

        // State

        let state = {
            variables: [],
            blocks: [],
        };

        function generateId() {
            return Math.random().toString(36).slice(2, 9);
        }

        // App mode

        let currentMode = AppMode.EDIT;

        function isReadMode() {
            return currentMode === AppMode.READ;
        }

        function setAppMode(mode) {
            currentMode = mode;
            try {
                localStorage.setItem(MODE_STORAGE_KEY, mode);
            } catch {}

            const isRead = mode === AppMode.READ;
            document.body.classList.toggle(CssClass.READ_MODE, isRead);

            // Update toggle button
            const btn = document.getElementById('mode-toggle-btn');
            if (btn) {
                const icon = btn.querySelector('svg');
                if (icon) icon.innerHTML = isRead ?
                    '<path d="M13 1l2 2L5 13l-3 1 1-3L13 1z"/>' :
                    '<path d="M5 7V5a3 3 0 0 1 6 0v2M3 7h10v7H3zM8 11v-1"/>';
                btn.title = isRead ? 'Switch to Edit mode' : 'Switch to Read mode';
            }
        }

        function toggleAppMode() {
            setAppMode(isReadMode() ? AppMode.EDIT : AppMode.READ);
        }

        function loadMode() {
            try {
                const saved = localStorage.getItem(MODE_STORAGE_KEY);
                if (saved === AppMode.READ || saved === AppMode.EDIT) {
                    setAppMode(saved);
                }
            } catch {}
        }

        //  Persistence

        function saveState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
            } catch {}
        }

        function loadState() {
            try {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) state = JSON.parse(saved);
            } catch {}
            if (!state.variables) state.variables = [];
            if (!state.blocks) state.blocks = [];
        }

        //  Variable resolution

        function getVariableMap() {
            const map = {};
            for (const variable of state.variables) {
                if (variable.key.trim()) map[variable.key.trim()] = variable.value;
            }
            return map;
        }

        function resolveCommandText(rawText) {
            const variableMap = getVariableMap();
            const segments = [];
            const tokenRegex = /\{([^}]+)\}/g;
            let lastIndex = 0;
            let match;

            while ((match = tokenRegex.exec(rawText)) !== null) {
                if (match.index > lastIndex) {
                    segments.push({
                        text: rawText.slice(lastIndex, match.index),
                        type: SegmentType.LITERAL
                    });
                }
                const key = match[1];
                if (Object.prototype.hasOwnProperty.call(variableMap, key)) {
                    const value = variableMap[key];
                    segments.push({
                        text: value || `{${key}}`,
                        type: value ? SegmentType.RESOLVED : SegmentType.UNRESOLVED
                    });
                } else {
                    segments.push({
                        text: match[0],
                        type: SegmentType.UNRESOLVED
                    });
                }
                lastIndex = match.index + match[0].length;
            }

            if (lastIndex < rawText.length) {
                segments.push({
                    text: rawText.slice(lastIndex),
                    type: SegmentType.LITERAL
                });
            }

            return segments;
        }

        function resolveCommandToString(rawText) {
            return resolveCommandText(rawText).map(segment => segment.text).join('');
        }

        function buildPreviewHTML(rawText) {
            const segments = resolveCommandText(rawText);
            return segments.map(segment => {
                const escaped = escapeHtml(segment.text);
                if (segment.type === SegmentType.RESOLVED)
                    return `<span class="token-resolved">${escaped}</span>`;
                if (segment.type === SegmentType.UNRESOLVED)
                    return `<span class="token-unresolved">${escaped}</span>`;
                return escaped;
            }).join('');
        }

        function hasUnresolvedTokens(rawText) {
            return resolveCommandText(rawText).some(segment => segment.type === SegmentType.UNRESOLVED);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function linkifyText(text) {
            return escapeHtml(text).replace(LinkifyConfig.URL_REGEX, (url) => {
                return `<a href="${url}" class="note-link" target="${Anchor.TARGET_BLANK}" rel="${Anchor.REL}">${url}</a>`;
            });
        }

        //  Variables

        function addVariable() {
            if (isReadMode()) {
                return;
            }

            const newVariable = {
                id: generateId(),
                key: '',
                value: ''
            };
            state.variables.push(newVariable);
            saveState();
            renderVariablesList();
            // Focus the new key input
            const rows = document.querySelectorAll('.variable-row');
            const lastRow = rows[rows.length - 1];
            if (lastRow) lastRow.querySelector('.variable-key-input')?.focus();
        }

        function removeVariable(variableId) {
            if (isReadMode()) {
                return;
            }

            state.variables = state.variables.filter(variable => variable.id !== variableId);
            saveState();
            renderVariablesList();
            refreshAllPreviews();
        }

        function updateVariable(variableId, field, value) {
            const variable = state.variables.find(variable => variable.id === variableId);
            if (!variable) {
                return;
            }

            variable[field] = value;
            saveState();
            refreshAllPreviews();
        }

        function renderVariablesList() {
            const container = document.getElementById(ElementId.VARIABLES_LIST);
            container.innerHTML = '';

            if (state.variables.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.style.cssText =
                    'font-size:var(--text-md); font-family:var(--font-mono); color:var(--color-text-muted); padding: var(--space-2) 0;';
                emptyMsg.textContent = 'No variables defined.';
                container.appendChild(emptyMsg);
            } else {
                for (const variable of state.variables) {
                    const row = document.createElement('div');
                    row.className = 'variable-row';
                    row.dataset.variableId = variable.id;

                    row.innerHTML = `
            <input
              class="variable-key-input"
              type="text"
              placeholder="VAR_NAME"
              value="${escapeHtml(variable.key)}"
              spellcheck="false"
              autocomplete="off"
              oninput="updateVariable('${variable.id}', '${VariableField.KEY}', this.value)"
            />
            <input
              class="variable-value-input"
              type="text"
              placeholder="value"
              value="${escapeHtml(variable.value)}"
              spellcheck="false"
              autocomplete="off"
              oninput="updateVariable('${variable.id}', '${VariableField.VALUE}', this.value)"
            />
            <button
              class="btn btn-icon btn-danger-ghost"
              onclick="removeVariable('${variable.id}')"
              title="Remove variable"
            >
              <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M3 3l10 10M13 3L3 13"/>
              </svg>
            </button>
          `;
                    container.appendChild(row);
                }
            }

            // Inline add button at the bottom
            const addRow = document.createElement('div');
            addRow.className = 'variable-add-row';
            addRow.innerHTML = `
        <button class="btn" onclick="addVariable()">
          <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M8 3v10M3 8h10"/>
          </svg>
          Add variable
        </button>
      `;
            container.appendChild(addRow);
        }

        //  Blocks

        function addBlock(blockType) {
            if (isReadMode()) {
                return;
            }

            let newBlock;

            if (blockType === BlockType.COMMAND) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.COMMAND,
                    text: ''
                };
            } else if (blockType === BlockType.NOTE) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.NOTE,
                    text: '',
                    style: NoteStyle.BODY
                };
            } else if (blockType === BlockType.DIVIDER) {
                newBlock = {
                    id: generateId(),
                    type: BlockType.DIVIDER
                };
            }

            state.blocks.push(newBlock);
            saveState();
            renderBlocksList();
            updateEmptyState();

            // Focus the text area of the new block
            const allBlockElements = document.querySelectorAll('.block-item');
            const lastBlockElement = allBlockElements[allBlockElements.length - 1];
            if (lastBlockElement) {
                const textarea = lastBlockElement.querySelector('textarea');
                if (textarea) textarea.focus();
            }
        }

        function removeBlock(blockId) {
            if (isReadMode()) {
                return;
            }

            state.blocks = state.blocks.filter(block => block.id !== blockId);
            saveState();
            renderBlocksList();
            updateEmptyState();
        }

        function updateBlockText(blockId, text) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block) return;
            block.text = text;
            saveState();
            if (block.type === BlockType.COMMAND) refreshBlockPreview(blockId);
            if (block.type === BlockType.NOTE) refreshNotePreview(blockId);
        }

        function updateBlockStyle(blockId, style) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.NOTE) return;
            block.style = style;
            saveState();

            const blockElement = document.querySelector(`[data-block-id="${blockId}"]`);
            if (!blockElement) return;

            const textarea = blockElement.querySelector('.note-textarea');
            const label = blockElement.querySelector('.note-auto-width');
            const preview = blockElement.querySelector('.note-preview');

            if (textarea) {
                textarea.className = `note-textarea style-${style}`;
            }
            if (label) {
                label.className = `note-auto-width style-${style}`;
            }
            if (preview) {
                preview.className = `note-preview style-${style}`;
            }
            blockElement.querySelectorAll('.note-style-btn').forEach(button => {
                button.classList.toggle(CssClass.ACTIVE, button.dataset.style === style);
            });
            refreshNotePreview(blockId);
        }

        function moveBlock(blockId, direction) {
            const index = state.blocks.findIndex(block => block.id === blockId);
            if (index < 0) return;
            const targetIndex = direction === MoveDirection.UP ? index - 1 : index + 1;
            if (targetIndex < 0 || targetIndex >= state.blocks.length) return;
            [state.blocks[index], state.blocks[targetIndex]] = [state.blocks[targetIndex], state.blocks[index]];
            saveState();
            renderBlocksList();
        }

        function refreshBlockPreview(blockId) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) return;

            const blockElement = document.querySelector(`[data-block-id="${blockId}"]`);
            if (!blockElement) return;

            const previewEl = blockElement.querySelector('.command-preview-text');
            if (!previewEl) return;

            previewEl.innerHTML = buildPreviewHTML(block.text);
            const isUnresolved = hasUnresolvedTokens(block.text);
            previewEl.classList.toggle(CssClass.HAS_UNRESOLVED, isUnresolved);

            // Auto-resize textarea
            const textarea = blockElement.querySelector('.command-textarea');
            if (textarea) autoResizeTextarea(textarea);
        }

        function refreshNotePreview(blockId) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.NOTE) return;

            const blockElement = document.querySelector(`[data-block-id="${blockId}"]`);
            if (!blockElement) return;

            const previewEl = blockElement.querySelector('.note-preview');
            if (!previewEl) return;

            const noteStyle = block.style || NoteStyle.BODY;
            previewEl.innerHTML = block.text ?
                linkifyText(block.text) :
                `<span style="color:var(--color-text-muted)">${notePlaceholder(noteStyle)}</span>`;
        }

        function refreshAllPreviews() {
            for (const block of state.blocks) {
                if (block.type === BlockType.COMMAND) refreshBlockPreview(block.id);
            }
        }

        function autoResizeTextarea(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function syncNoteWidth(textarea) {
            const label = textarea.closest('.note-auto-width');
            if (label) label.dataset.value = textarea.value || textarea.placeholder;
        }

        //  Render: blocks

        function renderBlocksList() {
            const container = document.getElementById(ElementId.BLOCKS_LIST);
            container.innerHTML = '';

            for (const block of state.blocks) {
                const blockElement = buildBlockElement(block);
                container.appendChild(blockElement);
            }

            setupDragAndDrop();
        }

        function buildBlockElement(block) {
            const wrapper = document.createElement('div');
            wrapper.className = 'block-item';
            wrapper.dataset.blockId = block.id;
            // draggable is NOT set on the wrapper; only enabled when the drag handle is held

            if (block.type === BlockType.COMMAND) {
                wrapper.innerHTML = buildCommandBlockHTML(block);
            } else if (block.type === BlockType.NOTE) {
                wrapper.innerHTML = buildNoteBlockHTML(block);
            } else if (block.type === BlockType.DIVIDER) {
                wrapper.innerHTML = buildDividerBlockHTML(block);
            }

            // Left side: drag handle only
            const dragHandleEl = document.createElement('div');
            dragHandleEl.className = 'block-drag-handle';
            dragHandleEl.innerHTML = `
      <button class="btn btn-icon drag-handle" title="Drag to reorder">
        <svg viewBox="0 0 16 16" width="14" height="14"><circle cx="5" cy="4" r="1"/><circle cx="11" cy="4" r="1"/><circle cx="5" cy="8" r="1"/><circle cx="11" cy="8" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="11" cy="12" r="1"/></svg>
      </button>
    `;
            wrapper.appendChild(dragHandleEl);

            // Right side: delete only
            const sideControls = document.createElement('div');
            sideControls.className = 'block-controls';
            sideControls.innerHTML = `
      <button class="btn btn-icon btn-danger-ghost" onclick="removeBlock('${block.id}')" title="Delete block">
        <svg viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 4h10M6 4V2h4v2M5 4l.5 9h5l.5-9"/></svg>
      </button>
    `;
            wrapper.appendChild(sideControls);

            // Enable dragging ONLY when mousedown fires on the drag handle
            const dragHandle = dragHandleEl.querySelector('.drag-handle');
            dragHandle.addEventListener(EventType.MOUSE_DOWN, () => {
                wrapper.draggable = true;
            });
            wrapper.addEventListener(EventType.DRAG_END, () => {
                wrapper.draggable = false;
            });
            // Also reset if mouse is released off the element
            dragHandle.addEventListener(EventType.MOUSE_UP, () => {
                // Will be reset by dragend; this is a safety net for non-drag clicks
                setTimeout(() => {
                    wrapper.draggable = false;
                }, 50);
            });

            return wrapper;
        }

        function buildCommandBlockHTML(block) {
            const previewHTML = buildPreviewHTML(block.text);
            const isUnresolved = hasUnresolvedTokens(block.text);
            const escapedText = escapeHtml(block.text);
            const isEditorCollapsed = block.editorCollapsed === true;

            return `
      <div class="command-block">
        <div class="command-preview">
          <span class="command-preview-text ${isUnresolved ? CssClass.HAS_UNRESOLVED : ''}">${previewHTML || '<span style="color:var(--color-text-muted)">empty command</span>'}</span>
          <button class="btn btn-icon toggle-editor-btn ${isEditorCollapsed ? CssClass.EDITOR_COLLAPSED : ''}"
            onclick="toggleCommandEditor('${block.id}')"
            title="${isEditorCollapsed ? 'Show editor' : 'Hide editor'}"
          >
            <svg viewBox="0 0 12 12"><polyline points="2,4 6,8 10,4"/></svg>
          </button>
          <button class="btn" id="copy-btn-${block.id}" onclick="copyCommand('${block.id}')" title="Copy command">
            <svg viewBox="0 0 16 16" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="5" width="9" height="9" rx="1"/><path d="M3 11V2h9"/></svg>
          </button>
        </div>
        <div class="command-block-editor${isEditorCollapsed ? ` ${CssClass.COLLAPSED}` : ''}">
          <div class="command-gutter">
            <span class="command-gutter-prefix">$</span>
          </div>
          <textarea
            class="command-textarea"
            placeholder="oc rsh {POD_NAME}"
            spellcheck="false"
            autocomplete="off"
            rows="1"
            oninput="updateBlockText('${block.id}', this.value); autoResizeTextarea(this)"
          >${escapedText}</textarea>
        </div>
      </div>
    `;
        }

        function buildNoteBlockHTML(block) {
            const noteStyle = block.style || NoteStyle.BODY;
            const escapedText = escapeHtml(block.text);
            const previewHTML = linkifyText(block.text);
            return `
      <div class="note-block">
        <div class="note-style-row">
          ${[NoteStyle.HEADING, NoteStyle.SUBHEADING, NoteStyle.BODY].map(style => `
            <button
              class="note-style-btn ${noteStyle === style ? CssClass.ACTIVE : ''}"
              data-style="${style}"
              onclick="updateBlockStyle('${block.id}', '${style}')"
            >${style}</button>
          `).join('')}
        </div>
        <label class="note-auto-width style-${noteStyle}" data-value="${block.text || notePlaceholder(noteStyle)}">
          <textarea
            class="note-textarea style-${noteStyle}"
            placeholder="${notePlaceholder(noteStyle)}"
            spellcheck="true"
            rows="1"
            oninput="updateBlockText('${block.id}', this.value); syncNoteWidth(this)"
            onfocus="this.closest('.note-block').classList.add('${CssClass.IS_FOCUSED}')"
            onblur="this.closest('.note-block').classList.remove('${CssClass.IS_FOCUSED}')"
          >${escapedText}</textarea>
          <div class="note-preview style-${noteStyle}">${previewHTML || `<span style="color:var(--color-text-muted)">${notePlaceholder(noteStyle)}</span>`}</div>
        </label>
      </div>
    `;
        }

        function buildDividerBlockHTML(block) {
            return `
      <div class="divider-block">
        <div class="divider-line"></div>
      </div>
    `;
        }

        function notePlaceholder(style) {
            if (style === NoteStyle.HEADING) return 'Section heading...';
            if (style === NoteStyle.SUBHEADING) return 'Section subheading...';
            return 'Section body...';
        }

        function updateEmptyState() {
            const emptyState = document.getElementById(ElementId.EMPTY_STATE);
            if (!emptyState) return;
            emptyState.style.display = state.blocks.length === 0 ? 'block' : 'none';
        }

        //  Copy to clipboard

        function copyCommand(blockId) {
            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) return;

            const resolvedText = resolveCommandToString(block.text);

            navigator.clipboard.writeText(resolvedText).then(() => {
                const button = document.getElementById(`copy-btn-${blockId}`);
                if (button) {
                    const svg = button.querySelector('svg');
                    const originalSvg = svg.cloneNode(true);
                    svg.innerHTML =
                        '<polyline points="2,8 6,12 14,4" stroke="var(--success)" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
                    setTimeout(() => {
                        const currentSvg = button.querySelector('svg');
                        if (currentSvg) currentSvg.replaceWith(originalSvg);
                    }, 1800);
                }
            }).catch(() => {
                // Fallback for older browsers
                const tempTextArea = document.createElement('textarea');
                tempTextArea.value = resolvedText;
                document.body.appendChild(tempTextArea);
                tempTextArea.select();
                document.execCommand('copy');
                document.body.removeChild(tempTextArea);
            });
        }

        //  Toggle command editor

        function toggleCommandEditor(blockId) {
            if (isReadMode()) {
                return;
            }

            const block = state.blocks.find(block => block.id === blockId);
            if (!block || block.type !== BlockType.COMMAND) return;
            block.editorCollapsed = !block.editorCollapsed;
            saveState();

            const blockElement = document.querySelector(`[data-block-id="${blockId}"]`);
            if (!blockElement) return;

            const editorEl = blockElement.querySelector('.command-block-editor');
            const toggleBtn = blockElement.querySelector('.toggle-editor-btn');

            if (editorEl) editorEl.classList.toggle(CssClass.COLLAPSED, block.editorCollapsed);
            if (toggleBtn) {
                toggleBtn.classList.toggle(CssClass.EDITOR_COLLAPSED, block.editorCollapsed);
                toggleBtn.title = block.editorCollapsed ? 'Show editor' : 'Hide editor';
            }
        }

        //  Drag and drop reordering

        let dragSourceId = null;

        function setupDragAndDrop() {
            const container = document.getElementById(ElementId.BLOCKS_LIST);

            container.querySelectorAll('.block-item').forEach(blockElement => {
                blockElement.addEventListener(EventType.DRAG_START, event => {
                    dragSourceId = blockElement.dataset.blockId;
                    blockElement.classList.add(CssClass.DRAGGING);
                    event.dataTransfer.effectAllowed = DragEffect.MOVE;
                });

                blockElement.addEventListener(EventType.DRAG_END, () => {
                    blockElement.classList.remove(CssClass.DRAGGING);
                    container.querySelectorAll('.block-item').forEach(el => el.classList.remove(
                        CssClass.DRAG_OVER));
                    dragSourceId = null;
                });

                blockElement.addEventListener(EventType.DRAG_OVER, event => {
                    event.preventDefault();
                    if (blockElement.dataset.blockId !== dragSourceId) {
                        container.querySelectorAll('.block-item').forEach(el => el.classList.remove(
                            CssClass.DRAG_OVER));
                        blockElement.classList.add(CssClass.DRAG_OVER);
                    }
                });

                blockElement.addEventListener(EventType.DROP, event => {
                    event.preventDefault();
                    if (isReadMode()) {
                        return;
                    }

                    const targetId = blockElement.dataset.blockId;
                    if (!dragSourceId || dragSourceId === targetId) return;

                    const sourceIndex = state.blocks.findIndex(block => block.id === dragSourceId);
                    const targetIndex = state.blocks.findIndex(block => block.id === targetId);

                    if (sourceIndex < 0 || targetIndex < 0) return;

                    const [removed] = state.blocks.splice(sourceIndex, 1);
                    state.blocks.splice(targetIndex, 0, removed);

                    saveState();
                    renderBlocksList();
                    updateEmptyState();
                });
            });
        }

        //  Export / Import

        function exportToFile() {
            const exportData = JSON.stringify(state, null, 2);
            const blob = new Blob([exportData], {
                type: ExportConfig.MIME_TYPE
            });
            const url = URL.createObjectURL(blob);
            const anchor = document.createElement('a');
            anchor.href = url;
            anchor.download = ExportConfig.FILENAME;
            anchor.click();
            URL.revokeObjectURL(url);
        }

        function openImportDialog() {
            document.getElementById(ElementId.IMPORT_FILE_INPUT).click();
        }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (loadEvent) {
                try {
                    const importedState = JSON.parse(loadEvent.target.result);
                    if (!importedState.variables || !importedState.blocks) throw new Error('Invalid format');
                    state = importedState;
                    saveState();
                    renderVariablesList();
                    renderBlocksList();
                    updateEmptyState();
                    setTimeout(refreshAllPreviews, 0);
                } catch {
                    alert('Could not import: invalid file.');
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        //  Clear & Toggle

        function clearAllData() {
            if (!confirm('Are you sure you want to delete all variables and blocks? This action cannot be undone.')) {
                return;
            }

            state.variables = [];
            state.blocks = [];
            saveState();
            renderVariablesList();
            renderBlocksList();
            updateEmptyState();
        }

        function toggleAllCommandEditors() {
            if (isReadMode()) {
                return;
            }

            const allCollapsed = state.blocks
                .filter(block => block.type === BlockType.COMMAND)
                .every(block => block.editorCollapsed === true);

            const newState = !allCollapsed;

            for (const block of state.blocks) {
                if (block.type === BlockType.COMMAND) {
                    block.editorCollapsed = newState;
                }
            }
            saveState();
            renderBlocksList();
        }

        //  Bootstrap

        function init() {
            loadState();
            loadMode();
            renderVariablesList();
            renderBlocksList();
            updateEmptyState();

            // Auto-resize all textareas after render
            setTimeout(() => {
                document.querySelectorAll('textarea').forEach(autoResizeTextarea);
                document.querySelectorAll('.note-textarea').forEach(textarea => syncNoteWidth(textarea));
                refreshAllPreviews();
            }, 0);
        }

        // Ctrl+click to open note links

        let mouseX = 0;
        let mouseY = 0;

        document.addEventListener(EventType.MOUSE_MOVE, e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            updateCtrlCursor();
        });

        document.addEventListener(EventType.KEY_DOWN, e => {
            if (e.key === Key.CONTROL || e.key === Key.META) {
                document.body.classList.add(CssClass.CTRL_HELD);
                updateCtrlCursor();
            }
        });

        document.addEventListener(EventType.KEY_UP, e => {
            if (e.key === Key.CONTROL || e.key === Key.META) {
                document.body.classList.remove(CssClass.CTRL_HELD);
                document.body.style.cursor = Cursor.DEFAULT;
            }
        });

        document.addEventListener(EventType.CLICK, e => {
            if (!e.ctrlKey && !e.metaKey) {
                return;
            }

            const link = document.elementsFromPoint(e.clientX, e.clientY)
                .find(el => el.matches(Selector.NOTE_LINK));

            if (link) {
                e.preventDefault();
                window.open(link.href, Anchor.TARGET_BLANK, Anchor.REL);
            }
        });

        function updateCtrlCursor() {
            if (!document.body.classList.contains(CssClass.CTRL_HELD)) {
                document.body.style.cursor = Cursor.DEFAULT;
                return;
            }

            const overLink = document.elementsFromPoint(mouseX, mouseY)
                .some(el => el.matches(Selector.NOTE_LINK));

            document.body.style.cursor = overLink ? Cursor.POINTER : Cursor.DEFAULT;
        }

        init();
    </script>
</body>

</html>
