<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommandPad</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230a0a0c'/><text x='4' y='23' font-family='monospace' font-size='20' font-weight='bold' fill='%2334d399'>$_</text></svg>">
    <style>
        :root {
            /* Core config */
            --base-unit: 17px;
            --font-mono: 'Cascadia Code', monospace;
            --font-sans: 'Inter', sans-serif;

            /* Accents & semantic colors */
            --accent: #3b82f6;
            --accent-dim: rgba(59, 130, 246, 0.12);
            --accent-text: #93c5fd;
            --success: #34d399;
            --danger: #f87171;
            --danger-dim: rgba(248, 113, 113, 0.12);
            --tag-bg: rgba(59, 130, 246, 0.1);

            /* Surfaces */
            --color-bg: #0a0a0c;
            --color-surface: #111114;
            --color-surface-alt: #18181d;
            --color-border: #232329;
            --color-border-focus: #3b82f6;

            /* Text */
            --color-text-primary: #f1f2f4;
            --color-text-secondary: #8b8d98;
            --color-text-muted: #3f4150;

            /* Note text styles */
            --code-color: #ff9800;
            --code-bg: rgba(255, 152, 0, 0.08);
            --code-border: rgba(255, 152, 0, 0.2);
            --selection-color: #0338a2;

            /* Space scale */
            --space-1: 0.125rem;
            --space-2: 0.25rem;
            --space-3: 0.375rem;
            --space-4: 0.5rem;
            --space-5: 0.625rem;
            --space-6: 0.75rem;
            --space-8: 1rem;
            --space-12: 1.5rem;
            --space-20: 2.5rem;

            /* Text scale */
            --text-xs: 0.6875rem;
            --text-sm: 0.8125rem;
            --text-md: 0.875rem;
            --text-base: 1rem;
            --text-xl: 1.125rem;
            --text-lg: 1.5rem;

            /* Radius scale */
            --radius-sm: 0.25rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.625rem;

            /* Icon scale */
            --icon-sm: 0.75rem;
            --icon-md: 0.875rem;
            --icon-base: 1rem;
            --icon-lg: 2.875rem;

            /* Layout dimensions */
            --sidebar-width: 18.75rem;
            --header-height: 3.5rem;
            --scrollbar-size: 0.625rem;
            --block-min-width: 7.5rem;

            /* Compound tokens */
            --border-standard: 1px solid var(--color-border);
            --border-dashed: var(--space-1) dashed var(--accent);
            --transition-fast: 0.15s;
            --transition-base: 0.2s;
        }

        /* --- BASE --- */

        html {
            font-size: var(--base-unit);
            box-sizing: border-box;
        }

        *,
        *::before,
        *::after {
            box-sizing: inherit;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background-color: var(--color-bg);
            color: var(--color-text-primary);
            font-family: var(--font-sans);
            line-height: 1.5;
        }

        /* --- DISABLE USER SELECT --- */

        .btn,
        .no-user-select {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* --- SCROLLBAR --- */

        ::-webkit-scrollbar {
            width: var(--scrollbar-size);
            height: var(--scrollbar-size);
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: var(--radius-md);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-muted);
        }

        /* --- LAYOUT --- */

        .app-shell {
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            grid-template-rows: var(--header-height) 1fr;
            grid-template-areas:
                "header header"
                "sidebar main";
            height: 100vh;
            overflow: hidden;
        }

        /* --- HEADER --- */

        .app-header {
            grid-area: header;
            display: flex;
            align-items: center;
            padding: 0 var(--space-12);
            gap: var(--space-8);
            border-bottom: var(--border-standard);
            background: var(--color-surface);
        }

        .app-name {
            font-family: var(--font-mono);
            font-size: var(--text-lg);
            font-weight: 600;
            letter-spacing: -0.02em;
            color: var(--color-text-primary);
            flex-shrink: 0;
        }

        .header-spacer {
            flex: 1;
        }

        .header-separator {
            width: 1px;
            height: var(--space-12);
            background: var(--color-border);
            flex-shrink: 0;
            margin: 0 var(--space-4);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }

        /* --- SIDEBAR --- */

        .app-sidebar {
            grid-area: sidebar;
            background: var(--color-surface);
            border-right: var(--border-standard);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .section-title {
            font-size: var(--text-sm);
            font-family: var(--font-sans);
            letter-spacing: 0.05em;
            color: var(--color-text-muted);
            white-space: nowrap;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .sidebar-section-header {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-6) var(--space-6) 0 var(--space-6);
            cursor: pointer;
        }

        .sidebar-section-empty-msg {
            font-size: var(--text-md);
            font-family: var(--font-mono);
            color: var(--color-text-muted);
            padding: var(--space-2) var(--space-12);
        }

        .sidebar-section-chevron {
            width: var(--icon-sm);
            height: var(--icon-sm);
            fill: none;
            stroke: var(--color-text-muted);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform var(--transition-base);
            flex-shrink: 0;
        }

        .sidebar-section.collapsed .sidebar-section-chevron {
            transform: rotate(-90deg);
        }

        .sidebar-section.collapsed .sidebar-section-body {
            display: none;
        }

        .sidebar-section-body {
            overflow-y: auto;
            padding: var(--space-6) var(--space-4);
        }

        .sidebar-divider {
            height: 1px;
            background: var(--color-border);
            margin: var(--space-4) var(--space-6);
            flex-shrink: 0;
        }

        /* --- RUNBOOK LIBRARY SECTION --- */

        #runbook-list {
            flex: 0 1 auto;
        }

        .runbook-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-3);
            position: relative;
        }

        .runbook-item-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            color: var(--color-text-secondary);
            font-family: var(--font-mono);
            font-size: var(--text-md);
            padding: var(--space-3) var(--space-4);
            cursor: pointer;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            transition: color var(--transition-base);
        }

        .runbook-item-btn:hover {
            border-color: var(--color-border-focus);
            color: var(--color-text-primary);
        }

        .runbook-item-btn.active {
            background: var(--tag-bg);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .runbook-item-btn.active.drag-over {
            border-color: transparent;
        }

        .runbook-drag-handle,
        .runbook-row .btn-danger-ghost {
            opacity: 0;
            transition: opacity var(--transition-fast), color var(--transition-fast);
        }

        .runbook-row:hover .runbook-drag-handle,
        .runbook-row:hover .btn-danger-ghost {
            opacity: 1;
        }

        #runbook-add-row {
            padding: var(--space-3) var(--space-12);
        }

        #runbook-import-input {
            display: none;
        }

        /* --- VARIABLES SECTION --- */

        #variables-section {
            flex: 1 1 auto;
        }

        #variables-list {
            flex: 1;
            overflow-y: auto;
            padding: var(--space-6) var(--space-4);
        }

        .variable-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-3);
        }

        .variable-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: var(--space-3);
            align-items: center;
            margin-bottom: var(--space-3);
            position: relative;
        }

        .variable-drag-handle,
        .variable-row .btn-danger-ghost {
            opacity: 0;
            transition: opacity var(--transition-fast), color var(--transition-fast);
        }

        .variable-row:hover .variable-drag-handle,
        .variable-row:hover .btn-danger-ghost {
            opacity: 1;
        }

        #variable-add-row {
            padding: var(--space-3) var(--space-12);
        }

        .variable-key-input,
        .variable-value-input {
            font-family: var(--font-mono);
            font-size: var(--text-md);
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-sm);
            color: var(--color-text-primary);
            padding: var(--space-2) var(--space-4);
            width: 100%;
            outline: none;
            transition: border-color var(--transition-base);
            position: relative;
        }

        .variable-key-input {
            color: var(--accent-text);
            font-weight: 500;
        }

        .variable-key-input:focus,
        .variable-value-input:focus {
            border-color: var(--color-border-focus);
        }

        .variable-key-input::placeholder,
        .variable-value-input::placeholder {
            color: var(--color-text-muted);
        }

        /* Floating tooltip */
        .variable-key-input[title]:hover::after,
        .variable-value-input[title]:hover::after {
            content: attr(title);
            position: absolute;
            left: 0;
            top: calc(100% + var(--space-2));
            background: var(--color-surface-alt);
            border: var(--border-standard);
            border-radius: var(--radius-md);
            color: var(--color-text-primary);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            padding: var(--space-2) var(--space-4);
            white-space: pre;
            z-index: 100;
            pointer-events: none;
        }

        /* --- SIDEBAR COLLAPSE --- */

        .sidebar-collapse-btn {
            position: sticky;
            top: var(--space-1);
            align-self: flex-start;
            flex-shrink: 0;
            z-index: 10;
        }

        .app-shell.sidebar-collapsed {
            grid-template-columns: 0 1fr;
        }

        .app-shell.sidebar-collapsed #sidebar-chevron {
            transform: rotate(180deg);
        }

        .app-shell.sidebar-collapsed .app-sidebar {
            width: 0;
            overflow: hidden;
            border-right: none;
        }

        /* --- MAIN PANEL --- */

        .app-main {
            grid-area: main;
            overflow-y: auto;
            padding-top: var(--space-4);
            padding-right: var(--space-20);
            padding-bottom: var(--space-20);
            padding-left: var(--space-20);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }

        #blocks-list {
            display: grid;
            grid-template-columns: minmax(var(--block-min-width), max-content);
            max-width: 100%;
            gap: var(--space-3);
        }

        #empty-state {
            margin: auto;
            text-align: center;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
        }

        #empty-state svg {
            width: var(--icon-lg);
            height: var(--icon-lg);
            stroke: var(--color-text-muted);
            fill: none;
            stroke-width: 1.75;
        }

        #empty-state-title {
            font-size: var(--text-lg);
        }

        #empty-state-hint {
            font-size: var(--text-base);
            margin-top: var(--space-3)
        }

        /* --- BLOCK ITEMS --- */

        .block-item {
            position: relative;
        }

        .block-item:hover .block-controls,
        .block-item:hover .block-drag-handle {
            opacity: 1;
        }

        .block-controls {
            position: absolute;
            right: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(100%) translateY(-50%);
            display: flex;
            flex-direction: row;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .block-drag-handle {
            position: absolute;
            left: calc(var(--space-4) * -1);
            top: 50%;
            transform: translateX(-100%) translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .dragging {
            opacity: 0.5;
        }

        .drag-over {
            outline: var(--border-dashed);
            border-radius: var(--radius-sm);
        }

        .block-item.drag-over {
            border-radius: var(--radius-md);
        }

        /* Duplicate flash */

        @keyframes duplicate-flash {
            0% {
                outline: var(--space-1) solid var(--accent);
                outline-offset: var(--space-2);
            }

            100% {
                outline: var(--space-3) solid transparent;
                outline-offset: var(--space-2);
            }
        }

        .block-item.duplicate-flash {
            animation: duplicate-flash 0.5s ease-out forwards;
        }

        /* --- CTRL-HELD SUPPRESSIONS --- */

        body.ctrl-held:not(.read-mode) .block-controls,
        body.ctrl-held:not(.read-mode) .block-drag-handle,
        body.ctrl-held:not(.read-mode) .note-style-row,
        body.ctrl-held:not(.read-mode) .command-preview .btn {
            opacity: 0;
            pointer-events: none;
        }

        body.ctrl-held:not(.read-mode) * {
            user-select: none !important;
        }

        body.ctrl-held:not(.read-mode) .note-textarea,
        body.ctrl-held:not(.read-mode) .command-textarea,
        body.ctrl-held:not(.read-mode) .command-preview-text {
            pointer-events: none;
            cursor: default;
        }

        body.ctrl-held:not(.read-mode) .block-item:hover:not(.block-selected) {
            outline: var(--border-dashed);
            border-radius: var(--radius-lg);
        }

        .block-selected .command-block,
        .block-selected .note-block,
        .block-selected .divider-block {
            user-select: none;
            outline: var(--space-1) solid var(--accent);
        }

        /* --- COMMAND BLOCK --- */

        .command-block {
            background: var(--color-surface);
            border: var(--border-standard);
            border-radius: var(--radius-lg);
            overflow: hidden;
            max-width: 100%;
            min-width: 0;
        }

        .command-block-editor {
            display: flex;
            align-items: stretch;
            border-top: var(--border-standard);
            width: 100%;
            min-width: 0;
        }

        .command-block-editor.collapsed {
            display: none;
        }

        .command-gutter {
            padding: var(--space-5) var(--space-5) var(--space-5) var(--space-6);
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-md);
            line-height: 1.6;
            user-select: none;
            flex-shrink: 0;
            border-right: var(--border-standard);
            display: flex;
            align-items: flex-start;
        }

        .command-gutter-prefix {
            color: var(--success);
            font-weight: 600;
        }

        .command-textarea {
            flex: 1;
            min-width: 0;
            font-family: var(--font-mono);
            font-size: var(--text-base);
            background: transparent;
            border: none;
            color: var(--color-text-primary);
            padding: var(--space-5) var(--space-6);
            resize: none;
            outline: none;
            overflow: hidden;
            line-height: 1.6;
            width: 100%;
        }

        .command-preview {
            padding: var(--space-4) var(--space-6);
            display: flex;
            align-items: center;
            gap: var(--space-6);
            background: var(--color-bg);
        }

        .command-preview-text {
            font-family: var(--font-mono);
            font-size: var(--text-base);
            color: var(--success);
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: pre;
            min-width: 0;
            padding-bottom: var(--space-2);
        }

        .command-preview-text.has-unresolved {
            color: var(--color-text-secondary);
        }

        .token-resolved {
            color: var(--success);
        }

        .token-unresolved {
            color: var(--danger);
            font-weight: 600;
        }

        .token-literal {
            color: var(--color-text-secondary);
        }

        .toggle-editor-btn {
            margin-left: auto;
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            background: transparent;
            border: none;
            color: var(--color-text-muted);
            font-family: var(--font-mono);
            font-size: var(--text-xs);
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .toggle-editor-btn:hover {
            color: var(--color-text-secondary);
        }

        .toggle-editor-btn svg {
            width: var(--icon-sm);
            height: var(--icon-sm);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            transition: transform var(--transition-base);
        }

        .toggle-editor-btn.editor-collapsed svg {
            transform: rotate(-90deg);
        }

        /* --- NOTE BLOCK --- */

        .note-block {
            display: inline-grid;
            min-width: var(--block-min-width);
            border-radius: var(--radius-lg);
        }

        .note-auto-width {
            display: inline-grid;
            width: 100%;
        }

        .note-auto-width::after {
            content: attr(data-value) ' ';
            white-space: pre-wrap;
            word-break: break-word;
            visibility: hidden;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
        }

        .note-textarea {
            grid-area: 1 / 1 / 2 / 2;
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: transparent;
            caret-color: var(--color-text-primary);
            background: transparent;
            border: none;
            outline: none;
            resize: none;
            overflow: hidden;
            line-height: 1.65;
            padding: var(--space-2) 0;
            min-width: var(--block-min-width);
            width: auto;
        }

        .note-textarea::selection,
        .block-item.block-selected .note-textarea::selection {
            background: transparent;
        }

        body:not(.ctrl-held) .note-textarea::selection {
            background-color: var(--selection-color);
        }

        .note-textarea::placeholder {
            color: transparent;
        }

        /* Note styles: heading */

        .note-auto-width.style-heading,
        .note-auto-width.style-heading::after,
        .note-textarea.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: transparent;
            letter-spacing: -0.02em;
        }

        /* Note styles: subheading */

        .note-auto-width.style-subheading,
        .note-auto-width.style-subheading::after,
        .note-textarea.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-xl);
            font-weight: 500;
            color: transparent;
            letter-spacing: 0.03em;
        }

        /* --- Note markdown styles --- */

        .note-bold {
            font-weight: 800;
        }

        .note-italic {
            font-style: italic;
        }

        .note-code {
            font-family: var(--font-mono);
            font-size: 0.9em;
            background: var(--code-bg);
            color: var(--code-color);
            border: 1px solid var(--code-border);
            border-radius: var(--radius-sm);
            padding: 0.05em var(--space-3);
            white-space: nowrap;
        }

        /* Note preview */

        .note-preview {
            font-family: var(--font-sans);
            font-size: var(--text-base);
            color: var(--color-text-secondary);
            line-height: 1.65;
            padding: var(--space-2) 0;
            grid-area: 1 / 1 / 2 / 2;
            word-break: break-word;
            white-space: pre-wrap;
            pointer-events: none;
            position: relative;
            z-index: 1;
            user-select: none;
        }

        .note-preview.style-heading {
            font-family: var(--font-sans);
            font-size: var(--text-lg);
            font-weight: 600;
            color: var(--color-text-primary);
            letter-spacing: -0.02em;
        }

        .note-preview.style-subheading {
            font-family: var(--font-sans);
            font-size: var(--text-xl);
            font-weight: 500;
            color: var(--accent-text);
            letter-spacing: 0.03em;
        }

        /* Link activation */

        body.alt-held a.note-link {
            pointer-events: auto;
        }

        /* Note links */

        .note-link {
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px solid var(--accent-dim);
            transition: color var(--transition-base), border-color var(--transition-base);
        }

        .note-link:hover {
            color: var(--accent-text);
            border-bottom-color: var(--accent);
        }

        /* Note style picker */

        .note-style-row {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-2);
            opacity: 0;
            transition: opacity var(--transition-base);
        }

        .note-block:hover .note-style-row,
        .note-block.is-focused .note-style-row {
            opacity: 1;
        }

        .note-block.is-focused .note-preview {
            display: none;
        }

        .note-block.is-focused .note-textarea {
            color: var(--color-text-secondary);
        }

        .note-style-btn {
            padding: var(--space-1) var(--space-4);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            background: transparent;
            font-size: var(--text-sm);
            font-family: var(--font-mono);
            color: var(--color-text-muted);
            transition: all var(--transition-fast);
        }

        .note-style-btn:hover {
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
        }

        .note-style-btn.active {
            background: var(--tag-bg);
            border-color: var(--color-border-focus);
            color: var(--accent-text);
        }

        /* --- DIVIDER BLOCK --- */

        .divider-block {
            display: flex;
            align-items: center;
            gap: var(--space-6);
            padding: var(--space-4) 0;
            min-width: var(--block-min-width);
            border-radius: var(--radius-md);
        }

        .divider-line {
            flex: 1;
            height: var(--space-2);
            background: var(--color-border);
        }

        /* --- BUTTONS --- */

        .btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-3) var(--space-3);
            border-radius: var(--radius-md);
            font-family: var(--font-mono);
            font-size: var(--text-sm);
            font-weight: 500;
            cursor: pointer;
            border: var(--border-standard);
            background: var(--color-surface-alt);
            color: var(--color-text-secondary);
            transition: background var(--transition-base), color var(--transition-base), border-color var(--transition-base);
            outline: none;
            white-space: nowrap;
            text-decoration: none;
        }

        .btn:hover {
            background: var(--color-surface);
            border-color: var(--color-border-focus);
            color: var(--color-text-primary);
        }

        .btn svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        .btn-icon {
            padding: var(--space-2);
            border-radius: var(--radius-sm);
        }

        .btn-primary {
            background: var(--accent-dim);
            border-color: var(--accent);
            color: var(--accent-text);
        }

        .btn-primary:hover {
            background: var(--accent);
            color: #fff;
        }

        .btn-danger-ghost {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
        }

        .btn-danger-ghost:hover {
            background: var(--danger-dim);
            border-color: var(--danger);
            color: var(--danger);
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .btn-lg {
            padding: var(--space-4) var(--space-5);
            font-size: var(--text-md);
        }

        .btn-lg svg {
            width: var(--icon-base);
            height: var(--icon-base);
        }

        .btn-disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Drag handle button */

        .drag-handle,
        .variable-drag-handle {
            cursor: grab;
            color: var(--color-text-muted);
            padding: var(--space-2);
            border-radius: var(--radius-sm);
            transition: color var(--transition-fast);
        }

        .drag-handle:hover,
        .variable-drag-handle:hover {
            color: var(--color-text-primary);
        }

        .drag-handle svg,
        .variable-drag-handle svg {
            width: var(--icon-md);
            height: var(--icon-md);
            fill: currentColor;
            display: block;
        }

        /* --- ADD BLOCK ROW --- */

        #add-block-row {
            display: flex;
            align-items: center;
            gap: 0;
            padding: var(--space-8) 0 0;
            border-top: var(--space-1) dashed var(--color-border);
            margin-top: var(--space-4);
        }

        .new-block-row-label {
            margin-right: var(--space-6);
        }

        #add-block-row .btn {
            border-radius: 0;
            border-right-width: 0;
        }

        #add-block-row .btn:first-of-type {
            border-radius: var(--radius-md) 0 0 var(--radius-md);
        }

        #add-block-row .btn:last-of-type {
            border-radius: 0 var(--radius-md) var(--radius-md) 0;
            border-right-width: 1px;
        }

        #add-block-row .btn:hover {
            z-index: 1;
            position: relative;
            border-color: var(--color-border-focus);
        }

        /* --- MODE TOGGLE BUTTON --- */

        .btn-mode-toggle {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-muted);
            padding: var(--space-2);
        }

        .btn-mode-toggle:hover {
            background: transparent;
            border-color: transparent;
            color: var(--color-text-primary);
        }

        /* --- READ MODE SUPPRESSIONS --- */

        body.read-mode #runbook-add-row,
        body.read-mode .runbook-drag-handle,
        body.read-mode .runbook-row .btn-danger-ghost {
            display: none !important;
        }

        body.read-mode #add-block-row,
        body.read-mode #variable-add-row {
            display: none;
        }

        body.read-mode .variable-drag-handle,
        body.read-mode .variable-row .btn-danger-ghost {
            display: none !important;
        }

        /* Hide drag and delete button on blocks */
        body.read-mode .block-drag-handle,
        body.read-mode .block-controls {
            display: none !important;
        }

        /* Hide note style picker */
        body.read-mode .note-style-row {
            visibility: hidden;
        }

        /* Force all command editors collapsed and hide the toggle */
        body.read-mode .command-block-editor {
            display: none !important;
        }

        body.read-mode .toggle-editor-btn {
            display: none;
        }

        /* Make all textareas and inputs non-interactive */
        body.read-mode .note-textarea,
        body.read-mode .command-textarea {
            pointer-events: none;
            user-select: none;
            cursor: default;
            visibility: hidden;
        }

        body.read-mode .note-textarea:focus {
            caret-color: transparent;
            outline: none;
        }

        body.read-mode .variable-key-input,
        body.read-mode #collapse-all-btn {
            opacity: 0.5;
            pointer-events: none;
        }

        body.read-mode .runbook-row,
        body.read-mode .variable-row {
            grid-template-columns: 1fr;
        }

        /* Note links become clickable */
        body.read-mode .note-preview a.note-link {
            pointer-events: auto;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <!-- Header -->
        <header class="app-header">
            <span class="app-name">CommandPad</span>

            <div class="header-spacer"></div>

            <div class="header-actions">
                <button class="btn btn-lg btn-mode-toggle" id="mode-toggle-btn" onclick="toggleAppMode()"

        <!-- Sidebar -->

        <!-- Main panel -->

                    <polyline points="10,4 4,8 10,12" />

            <div id="empty-state" class="no-user-select">
                <svg viewBox="0 0 40 40">
                    <rect x="4" y="6" width="32" height="28" rx="3" />
                    <path d="M10 14l6 6-6 6M18 26h12" />
                </svg>
                <p id="empty-state-title">No blocks yet.</p>
                <p id="empty-state-hint">Add a command or note below.</p>
            </div>

            <div id="blocks-list"></div>

            <div id="add-block-row">
                <p class="section-title new-block-row-label no-user-select">NEW BLOCK</p>
                <button class="btn" onclick="addBlock('command')" title="Command block">
                    <svg viewBox="0 0 16 16" width="13" height="13">
                        <polyline points="2,4 5,4" />
                        <polyline points="2,8 8,8" />
                        <polyline points="8,4 14,8 8,12" />
                    </svg>
                    Command
                </button>
                <button class="btn" onclick="addBlock('note')" title="Note block">
                    <svg viewBox="0 0 16 16" width="13" height="13">
                        <path d="M3 3h10v8l-3 3H3z" />
                        <path d="M10 11v3" />
                    </svg>
                    Note

                <button class="btn" onclick="addBlock('divider')" title="Divider block">
                    <svg viewBox="0 0 16 16">

                    </svg>
                    Divider
                </button>
            </div>
        </main>
    </div>

    <script>
        //  State
        const SAVE_TIMEOUT_MS = 200;
        const STORAGE_KEY = 'commandpad_v1';

        // Enums

        const AppMode = Object.freeze({
            EDIT: 'edit',
            READ: 'read',
        });

        const LassoMode = Object.freeze({
            SELECT: 'select',
            DESELECT: 'deselect',
        });

        const SidebarState = Object.freeze({
            EXPANDED: 'expanded',
            COLLAPSED: 'collapsed',
        });

        const SectionState = Object.freeze({
            EXPANDED: 'expanded',
            COLLAPSED: 'collapsed',
        });

        const RunbookConfig = Object.freeze({
            DB_NAME: 'commandpad_runbooks_db',
            DB_VERSION: 1,
            STORE_NAME: 'runbooks',
            LIBRARY_STORAGE_KEY: 'commandpad_runbook_library',
            SECTIONS_STORAGE_KEY: 'commandpad_sidebar_sections',
            DEFAULT_LABEL: 'Untitled runbook',
        });

        const IndexedDbTransactionMode = Object.freeze({
            READ_WRITE: 'readwrite',
            READ_ONLY: 'readonly',
        });

        const BlockType = Object.freeze({
            NOTE: 'note',
            COMMAND: 'command',
            DIVIDER: 'divider',
        });

        const NoteStyle = Object.freeze({
            BODY: 'body',
            SUBHEADING: 'subheading',
            HEADING: 'heading',
        });

        const MarkdownToken = Object.freeze({
            CODE_REGEX: /[`´](.+?)[`´]/g,
            BOLD_REGEX: /\*\*(.+?)\*\*/g,
            ITALIC_REGEX: /(?<!\*)\*(?!\*)(.+?)(?<!\*)\*(?!\*)|_(.+?)_/g,
            URL_REGEX: /(https?:\/\/[^\s<>"{}|\\^`\[\]]*[^\s<>"{}|\\^`\[\].,;:!?()\-])/g,
        });

        const SegmentType = Object.freeze({
            LITERAL: 'literal',
            RESOLVED: 'resolved',
            UNRESOLVED: 'unresolved',
        });

        const MoveDirection = Object.freeze({
            UP: 'up',
            DOWN: 'down',
        });

        const VariableField = Object.freeze({
            KEY: 'key',
            VALUE: 'value',
        });

        const CssClass = Object.freeze({
            DRAGGING: 'dragging',
            DRAG_OVER: 'drag-over',
            COLLAPSED: 'collapsed',
            SIDEBAR_COLLAPSED: 'sidebar-collapsed',
            EDITOR_COLLAPSED: 'editor-collapsed',
            ACTIVE: 'active',
            IS_FOCUSED: 'is-focused',
            HAS_UNRESOLVED: 'has-unresolved',
            CTRL_HELD: 'ctrl-held',
            ALT_HELD: 'alt-held',
            READ_MODE: 'read-mode',
            DUPLICATE_FLASH: 'duplicate-flash',
            BLOCK_SELECTED: 'block-selected',
            SELECTING: 'selecting',
            BTN_DISABLED: 'btn-disabled',
            BLOCK_CONTROLS: 'block-controls',
            BLOCK_DRAG_HANDLE: 'block-drag-handle',
            SECTION_COLLAPSED: 'collapsed',
            RUNBOOK_ACTIVE: 'active',
            SIDEBAR_SECTION_EMPTY_MSG: 'sidebar-section-empty-msg',
        });

        const CssAttribute = Object.freeze({
            DISABLED: 'disabled',
        });

        const EventType = Object.freeze({
            ANIMATION_END: 'animationend',
            CLICK: 'click',
            DROP: 'drop',
            DRAG_END: 'dragend',
            DRAG_OVER: 'dragover',
            DRAG_START: 'dragstart',
            DRAG_LEAVE: 'dragleave',
            KEY_UP: 'keyup',
            KEY_DOWN: 'keydown',
            MOUSE_UP: 'mouseup',
            MOUSE_DOWN: 'mousedown',
            MOUSE_ENTER: 'mouseenter',
            MOUSE_MOVE: 'mousemove',
            SCROLL: 'scroll',
        });

        const Key = Object.freeze({
            ALT: 'Alt',
            CTRL: 'Control',
            ESCAPE: 'Escape',
            DELETE: 'Backspace',
            SHIFT_E: 'E',
            E: 'e',
            G: 'g',
            I: 'i',
            S: 's',
        });

        const Cursor = Object.freeze({
            DEFAULT: '',
            POINTER: 'pointer',
        });

        const DataAttr = Object.freeze({
            VARIABLE_ID: 'variableId',
        });

        const Selector = Object.freeze({
            APP_SHELL: '.app-shell',
            BLOCK_ITEM: '.block-item',
            NOTE_LINK: 'a.note-link',
            NOTE_TEXTAREA: '.note-textarea',
            NOTE_AUTO_WIDTH: '.note-auto-width',
            NOTE_PREVIEW: '.note-preview',
            COMMAND_TEXTAREA: '.command-textarea',
            VARIABLE_ROW: '.variable-row',
            VARIABLE_INPUTS: '.variable-inputs',
            VARIABLE_DRAG_HANDLE: '.variable-drag-handle',
            BLOCK_SELECTED: '.block-item.block-selected',
            COMMAND_BLOCK_EDITOR: '.command-block-editor',
            TOGGLE_EDITOR_BTN: '.toggle-editor-btn',
            RUNBOOK_ROW: '.runbook-row',
            RUNBOOK_ITEM_BTN: '.runbook-item-btn',
            RUNBOOK_DRAG_HANDLE: '.runbook-drag-handle',
        });

        const Anchor = Object.freeze({
            TARGET_BLANK: '_blank',
            REL: 'noopener,noreferrer',
        });

        const ElementId = Object.freeze({
            MAIN_PANEL: 'main-panel',
            COLLAPSE_ALL_BTN: 'collapse-all-btn',
            EXPORT_BTN: 'export-btn',
            CLEAR_BTN: 'clear-btn',
            SIDEBAR_TOGGLE_BTN: 'sidebar-toggle-btn',
            VARIABLES_LIST: 'variables-list',
            BLOCKS_LIST: 'blocks-list',
            EMPTY_STATE: 'empty-state',
            DUPLICATE_BTN: 'duplicate-btn',
            RUNBOOK_LIST: 'runbook-list',
            RUNBOOK_SECTION: 'runbook-section',
            VARIABLES_SECTION: 'variables-section',
            RUNBOOK_IMPORT_INPUT: 'runbook-import-input',
        });

        const FilePickerConfig = Object.freeze({
            SUGGESTED_NAME: 'commandpad-export.json',
            DESCRIPTION: 'CommandPad JSON',
            EXTENSION: '.json',
            MIME_TYPE: 'application/json',
        });

        const DragEffect = Object.freeze({
            MOVE: 'move',
        });

        // State

        let state = {
            variables: [],
            blocks: [],
        };

        function generateId() {
            return Math.random().toString(36).slice(2, 9);
        }

        //  Runbook Library

        let runbookDbInstance = null;

        function openRunbookDb() {
            return new Promise((resolve, reject) => {
                if (runbookDbInstance) {
                    resolve(runbookDbInstance);
                    return;
                }

                const request = indexedDB.open(RunbookConfig.DB_NAME, RunbookConfig.DB_VERSION);

                request.onupgradeneeded = () => {
                    const db = request.result;
                    if (!db.objectStoreNames.contains(RunbookConfig.STORE_NAME)) {
                        db.createObjectStore(RunbookConfig.STORE_NAME, {
                            keyPath: 'id'
                        });
                    }
                };

                request.onsuccess = () => {
                    runbookDbInstance = request.result;
                    resolve(runbookDbInstance);
                };

                request.onerror = () => reject(request.error);
            });
        }

        async function putRunbookContent(id, content) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_WRITE);
                tx.objectStore(RunbookConfig.STORE_NAME).put({
                    id,
                    content
                });
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        async function getRunbookContent(id) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_ONLY);
                const request = tx.objectStore(RunbookConfig.STORE_NAME).get(id);
                request.onsuccess = () => resolve(request.result ? request.result.content : null);
                request.onerror = () => reject(request.error);
            });
        }

        async function deleteRunbookContent(id) {
            const db = await openRunbookDb();
            return new Promise((resolve, reject) => {
                const tx = db.transaction(RunbookConfig.STORE_NAME, IndexedDbTransactionMode.READ_WRITE);
                tx.objectStore(RunbookConfig.STORE_NAME).delete(id);
                tx.oncomplete = () => resolve();
                tx.onerror = () => reject(tx.error);
            });
        }

        //  Runbook library metadata

        let runbookLibrary = [];
        let activeRunbookId = null;

        function deriveRunbookLabel(runbookContent, fallback) {
            const firstBlock = runbookContent.blocks?.[0];
            if (firstBlock && firstBlock.type === BlockType.NOTE && firstBlock.text?.trim()) {
                return firstBlock.text.trim().slice(0, 60);
            }

            return fallback;
        }

        function saveRunbookLibrary() {
            try {
                localStorage.setItem(RunbookConfig.LIBRARY_STORAGE_KEY, JSON.stringify({
                    items: runbookLibrary,
                    activeId: activeRunbookId,
                }));
            } catch {}
        }

        function loadRunbookLibrary() {
            try {
                const saved = JSON.parse(localStorage.getItem(RunbookConfig.LIBRARY_STORAGE_KEY));
                if (!saved) {
                    return;
                }

                runbookLibrary = saved.items ?? [];
                activeRunbookId = saved.activeId ?? null;
            } catch {}
        }

        async function addRunbookToLibrary(content, fallbackLabel) {
            let id = null;
            const label = deriveRunbookLabel(content, fallbackLabel || RunbookConfig.DEFAULT_LABEL);

            // Overwrite runbook
            const existingEntry = runbookLibrary.find(item => item.label === label);
            if (existingEntry) {
                id = existingEntry.id;
            } else {
                id = generateId();
                runbookLibrary.push({
                    id,
                    label
                });

                // Keep the list sorted
                runbookLibrary.sort((a, b) => a.label.localeCompare(b.label));
            }

            await putRunbookContent(id, content);

            if (existingEntry || activeRunbookId) {
                saveRunbookLibrary();
                renderRunbookList();
                return;
            }

            await loadRunbookFromLibrary(id);
        }

        async function loadRunbookFromLibrary(id) {
            const content = await getRunbookContent(id);
            if (!content) {
                return;
            }

            state.variables = content.variables ?? [];
            state.blocks = content.blocks ?? [];
            activeRunbookId = id;

            saveState();
            saveRunbookLibrary();
            renderVariablesList();
            renderBlocksList();
            updateEmptyState();
            renderRunbookList();
            setTimeout(refreshAllPreviews, 0);
        }

        async function overwriteActiveRunbookInLibrary() {
            if (!activeRunbookId) {
                return;
            }

            const entry = runbookLibrary.find(item => item.id === activeRunbookId);
            if (!entry) {
                return;
            }

            const content = {
                variables: state.variables,
                blocks: state.blocks
            };
            entry.label = deriveRunbookLabel(content, entry.label);

            await putRunbookContent(activeRunbookId, content);
            saveRunbookLibrary();
            renderRunbookList();
        }

        async function removeRunbookFromLibrary(id) {
            if (isReadMode()) {
                return;
            }

            const wasActive = activeRunbookId === id;

            runbookLibrary = runbookLibrary.filter(item => item.id !== id);
            await deleteRunbookContent(id);

            if (wasActive) {
                activeRunbookId = null;
                state.variables = [];
                state.blocks = [];
                saveState();
                renderVariablesList();
                renderBlocksList();
                updateEmptyState();
            }

            saveRunbookLibrary();
            renderRunbookList();
        }

        function openRunbookImportDialog() {
            document.getElementById(ElementId.RUNBOOK_IMPORT_INPUT).click();
        }

        function handleRunbookImport(event) {
            const files = Array.from(event.target.files || []);
            if (files.length === 0) {
                return;
            }

            let failedCount = 0;

            const readFile = file => new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = async loadEvent => {
                    try {
                        const importedContent = JSON.parse(loadEvent.target.result);
                        if (!importedContent.variables || !importedContent.blocks) {
                            throw new Error('Invalid format');
                        }
                        await addRunbookToLibrary(importedContent, file.name.replace(/\.json$/i, ''));
                    } catch {
                        failedCount += 1;
                    }
                    resolve();
                };
                reader.onerror = () => {
                    failedCount += 1;
                    resolve();
                };
                reader.readAsText(file);
            });

            Promise.all(files.map(readFile)).then(() => {
                if (failedCount > 0) {
                    alert(`${failedCount} file(s) could not be imported (invalid format).`);
                }
            });

            event.target.value = '';
        }

        //  Runbook library; render

        function renderRunbookList() {
            const container = document.getElementById(ElementId.RUNBOOK_LIST);
            container.innerHTML = '';

            if (runbookLibrary.length === 0) {
                const emptyMsg = document.createElement('p');
                emptyMsg.className = CssClass.SIDEBAR_SECTION_EMPTY_MSG;
                emptyMsg.textContent = 'No runbooks imported.';
                container.appendChild(emptyMsg);
            } else {
                for (const runbook of runbookLibrary) {
                    const row = document.createElement('div');
                    row.className = 'runbook-row';
                    row.dataset.runbookId = runbook.id;

                    const isActive = runbook.id === activeRunbookId;

                    row.innerHTML = `
                <div class="runbook-drag-handle drag-handle" title="Drag to reorder">
                    <svg viewBox="0 0 16 16"><circle cx="5" cy="4" r="1"/><circle cx="11" cy="4" r="1"/><circle cx="5" cy="8" r="1"/><circle cx="11" cy="8" r="1"/><circle cx="5" cy="12" r="1"/><circle cx="11" cy="12" r="1"/></svg>
                </div>
                <button class="runbook-item-btn ${isActive ? CssClass.RUNBOOK_ACTIVE : ''}"

        //  Persistence

        function saveState() {

        let savedScrollTop = 0;

        //  Variable resolution

        function getVariableMap() {
            const rawMap = {};
            for (const variable of state.variables) {
                if (!variable.key.trim()) {
                    continue;
                }

                rawMap[variable.key.trim()] = variable.value;
            }

            const resolvedMap = {};

            function resolveValue(key, visitedKeys = new Set()) {
                if (key in resolvedMap) {
                    return resolvedMap[key];
                }
                if (visitedKeys.has(key)) {
                    return `{${key}}`;
                }

                visitedKeys.add(key);
                const raw = rawMap[key] ?? '';
                const resolved = raw.replace(/\{([^}]+)\}/g, (match, refKey) => {
                    return refKey in rawMap ? resolveValue(refKey, new Set(visitedKeys)) : match;
                });

                resolvedMap[key] = resolved;
                return resolved;
            }

            for (const key of Object.keys(rawMap)) {
                resolveValue(key);
            }

            return resolvedMap;
        }

        function resolveCommandText(rawText) {
            const variableMap = getVariableMap();
            const segments = [];
            const tokenRegex = /\{([^}]+)\}/g;
            let lastIndex = 0;
            let match;

            while ((match = tokenRegex.exec(rawText)) !== null) {
                if (match.index > lastIndex) {
                    segments.push({
                        text: rawText.slice(lastIndex, match.index),
                        type: SegmentType.LITERAL
                    });
                }
                const key = match[1];
                if (Object.prototype.hasOwnProperty.call(variableMap, key)) {
                    const value = variableMap[key];
                    segments.push({
                        text: value || `{${key}}`,
                        type: value ? SegmentType.RESOLVED : SegmentType.UNRESOLVED
                    });
                } else {
                    segments.push({
                        text: match[0],
                        type: SegmentType.UNRESOLVED
                    });
                }
                lastIndex = match.index + match[0].length;
            }

            if (lastIndex < rawText.length) {
                segments.push({
                    text: rawText.slice(lastIndex),
                    type: SegmentType.LITERAL
                });
            }

            return segments;
        }

        function resolveCommandToString(rawText) {
            return resolveCommandText(rawText).map(segment => segment.text).join('');
        }

        function buildPreviewHTML(rawText) {
            const segments = resolveCommandText(rawText);
            return segments.map(segment => {
                const escaped = escapeHtml(segment.text);
                if (segment.type === SegmentType.RESOLVED)
                    return `<span class="token-resolved">${escaped}</span>`;
                if (segment.type === SegmentType.UNRESOLVED)
                    return `<span class="token-unresolved">${escaped}</span>`;
                return `<span class="token-literal">${escaped}</span>`;
            }).join('');
        }

        function hasUnresolvedTokens(rawText) {
            return resolveCommandText(rawText).some(segment => segment.type === SegmentType.UNRESOLVED);
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function formatNoteText(text) {
            const placeholders = [];

            // Extract code spans into placeholders so their content is protected
            let escaped = escapeHtml(text).replace(MarkdownToken.CODE_REGEX, (_, inner) => {
                const index = placeholders.length;
                placeholders.push(`<span class="note-code">${inner}</span>`);
                return `\x00CODE${index}\x00`;
            });

            // Bold
            escaped = escaped.replace(MarkdownToken.BOLD_REGEX, (_, inner) =>
                `<span class="note-bold">${inner}</span>`
            );

            // Italic
            escaped = escaped.replace(MarkdownToken.ITALIC_REGEX, (_, g1, g2) =>
                `<span class="note-italic">${g1 ?? g2}</span>`
            );

            // Links
            escaped = escaped.replace(MarkdownToken.URL_REGEX, (url) =>
                `<a href="${url}" class="note-link" target="${Anchor.TARGET_BLANK}" rel="${Anchor.REL}">${url}</a>`
            );

            // Restore code span placeholders
            escaped = escaped.replace(/\x00CODE(\d+)\x00/g, (_, i) => placeholders[Number(i)]);

            return escaped;
        }

        //  Variables

        function addVariable() {
            if (isReadMode()) {
                return;
            }

            const newVariable = {
                id: generateId(),
                key: '',
                value: ''
            };
            state.variables.push(newVariable);

            saveState();
            renderVariablesList();

            // Focus the new key input
            const rows = document.querySelectorAll('.variable-row');
            const lastRow = rows[rows.length - 1];
            if (lastRow) lastRow.querySelector('.variable-key-input')?.focus();
        }

        function removeVariable(variableId) {
            if (isReadMode()) {
                return;
            }

            state.variables = state.variables.filter(variable => variable.id !== variableId);
            saveState();
            renderVariablesList();
            refreshAllPreviews();
        }

        function updateVariable(variableId, field, value) {
            const variable = state.variables.find(variable => variable.id === variableId);
            if (!variable) {
                return;
            }

            if (field === VariableField.KEY) {
                const oldKey = variable.key.trim();
                const newKey = value.trim();

                if (oldKey && newKey && oldKey !== newKey) {
                    const oldToken = `{${oldKey}}`;
                    const newToken = `{${newKey}}`;

                    // Rename references inside blocks
                    for (const block of state.blocks) {
                        if (block.type === BlockType.COMMAND && block.text.includes(oldToken)) {
                            block.text = block.text.split(oldToken).join(newToken);
                        }
                    }

                    // Rename references inside variables
                    for (const otherVariable of state.variables) {
                        if (otherVariable.id !== variableId && otherVariable.value.includes(oldToken)) {
                            otherVariable.value = otherVariable.value.split(oldToken).join(newToken);

                            // Keep that variable's value input in sync
                            const otherRow = document.querySelector(
                                `${Selector.VARIABLE_ROW}[data-variable-id="${otherVariable.id}"]`);

                            const otherValueInput = otherRow?.querySelector('.variable-value-input');
                            if (otherValueInput) {
                                otherValueInput.value = otherVariable.value;
                                otherValueInput.title = otherVariable.value;
                            }
                        }
                    }

                    renderBlocksList();
                }
            }

            variable[field] = value;
            saveState();
            refreshAllPreviews();
        }

        function renderVariablesList() {
            const container = document.getElementById(ElementId.VARIABLES_LIST);
            container.innerHTML = '';

            if (state.variables.length === 0) {

                    row.innerHTML = `
            <div class="variable-drag-handle" title="Drag to reorder">

                <path d="M3 3l10 10M13 3L3 13"/>
              </svg>
            </button>
          `;
                    // Drag-and-drop
                    const handle = row.querySelector(Selector.VARIABLE_DRAG_HANDLE);

                    handle.addEventListener(EventType.MOUSE_DOWN, () => {

                    });

                    handle.addEventListener(EventType.MOUSE_UP, () => {
                        setTimeout(() => {
                            row.draggable = false;
                        }, 50);
                    });

                    row.addEventListener(EventType.DRAG_START, event => {
                        dragSourceVariableId = row.dataset.variableId;
                        event.dataTransfer.effectAllowed = DragEffect.MOVE;
                        row.classList.add(CssClass.DRAGGING);
                    });

                    row.addEventListener(EventType.DRAG_OVER, event => {
                        event.preventDefault();
                        if (row.dataset.variableId === dragSourceVariableId) {
                            return;
                        }

                        container.querySelectorAll(Selector.VARIABLE_ROW)
                            .forEach(el => el.querySelector(Selector.VARIABLE_INPUTS)?.classList.remove(CssClass
                                .DRAG_OVER));

                        row.querySelector(Selector.VARIABLE_INPUTS)?.classList.add(CssClass.DRAG_OVER);
                    });

                    row.addEventListener(EventType.DROP, event => {
                        event.preventDefault();
                        if (isReadMode()) {
                            return;
                        }

                        const targetId = row.dataset.variableId;
                        if (!dragSourceVariableId || dragSourceVariableId === targetId) {
                            return;
                        }

                        const sourceIndex = state.variables.findIndex(v => v.id === dragSourceVariableId);
                        const targetIndex = state.variables.findIndex(v => v.id === targetId);
                        if (sourceIndex < 0 || targetIndex < 0) {
                            return;
                        }

                        const [removed] = state.variables.splice(sourceIndex, 1);
                        state.variables.splice(targetIndex, 0, removed);

                        saveState();
                        renderVariablesList();
                    });

                    container.appendChild(row);
                }
            }

            // Inline add button at the bottom
            const addRow = document.createElement('div');
            addRow.id = 'variable-add-row';
            addRow.innerHTML = `
        <button class="btn" onclick="addVariable()" title="New variable">
